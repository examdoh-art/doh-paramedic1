  {"id": 81, "scen": "", "ask": "Police bring a 32-year-old male who is extremely aggressive, delirious, sweating heavily, and holding a knife before being restrained in the prone position. He is shouting, threatening to bite police and paramedics, and appears severely hyperthermic. He verbalizes that he can breathe. What is the MOST appropriate management?", "opts": ["Speak directly to the patient, attempt verbal calming, and order police to remove restraints", "Cool the patient aggressively and administer a fast-acting tranquilizer for chemical restraint", "Sit the patient upright and apply oxygen while maintaining verbal reassurance", "Allow the patient to remain in the same prone restraint position without intervention"], "ans": "B", "ansText": "B. Cool the patient aggressively and administer a fast-acting tranquilizer for chemical restraint", "exp": "This patient presents with excited delirium syndrome — a life-threatening condition characterized by extreme agitation, hyperthermia, and superhuman strength. Prone restraint is dangerous (positional asphyxia risk). The priority is aggressive cooling (hyperthermia kills) and rapid chemical sedation (ketamine or midazolam IM) to prevent rhabdomyolysis, cardiac arrest, and death.", "key": "Medical Emergency Knowledge"},
  {"id": 82, "scen": "", "ask": "A 20-year-old male collapses during football practice complaining of severe muscle cramps. His teammates report he consumed a large amount of potassium-rich fruits, including several bananas, before the game. On arrival, he is alert but weak. ECG shows tall, peaked T waves. What is the MOST likely diagnosis?", "opts": ["Hyperkalemia", "Hypokalemia", "Hypocalcemia", "Hyponatremia"], "ans": "A", "ansText": "A. Hyperkalemia", "exp": "Tall, peaked (tented) T waves are the earliest and most characteristic ECG finding of hyperkalemia. The clinical context (excessive potassium intake from bananas, muscle cramps, weakness) combined with peaked T waves confirms hyperkalemia. Severe hyperkalemia can progress to widened QRS, sine wave pattern, and cardiac arrest.", "key": "Medical Emergency Knowledge"},
  {"id": 83, "scen": "", "ask": "You arrive at the scene of a warehouse explosion. Ten injured people are already outside the building, and several of them tell you that more victims are still trapped inside. Flames and thick smoke are visible from the entrance. What should you do FIRST?", "opts": ["Enter the building immediately to search for the trapped victims", "Wait for fire rescue, ensure scene safety, request additional ambulances, and prepare to treat patients once they are brought out", "Attempt to crawl inside the building while holding your breath to avoid smoke", "Move the uninjured bystanders closer to the building to help with rescue efforts"], "ans": "B", "ansText": "B. Wait for fire rescue, ensure scene safety, request additional ambulances, and prepare to treat patients once they are brought out", "exp": "Scene safety is the absolute first priority. A burning building with flames and smoke is an IDLH (Immediately Dangerous to Life and Health) environment. Only trained, equipped fire rescue personnel should enter. EMS should: establish a safe perimeter, request additional resources, set up triage area, and prepare to treat patients as they are brought out.", "key": "Medical Emergency Knowledge"},
  {"id": 84, "scen": "", "ask": "A 24-year-old male with type 1 diabetes presents with vomiting, abdominal pain, and deep rapid breathing. His blood glucose is 480 mg/dL, and he appears dehydrated. Which of the following is NOT a typical feature of diabetic ketoacidosis (DKA)?", "opts": ["Polydipsia", "Rapid, deep breathing (Kussmaul respirations)", "Abdominal pain", "Hypertension"], "ans": "D", "ansText": "D. Hypertension", "exp": "DKA features include: hyperglycemia, Kussmaul respirations (deep, rapid — compensating for metabolic acidosis), abdominal pain, nausea/vomiting, polydipsia, polyuria, dehydration, and fruity breath (acetone). Hypertension is NOT typical — patients are usually hypotensive or normotensive due to significant volume depletion from osmotic diuresis.", "key": "Medical Emergency Knowledge"},
  {"id": 85, "scen": "", "ask": "When administering midazolam rectally for seizure control, what is the typical absorption/onset time?", "opts": ["2–3 minutes", "5–15 minutes", "10–30 minutes", "20–40 minutes"], "ans": "B", "ansText": "B. 5–15 minutes", "exp": "Rectal midazolam has an onset of 5-15 minutes due to absorption through the rectal mucosa into the hemorrhoidal veins, partially bypassing first-pass hepatic metabolism. IV onset is 1-2 minutes, IM is 5-10 minutes, and intranasal is 3-5 minutes. Rectal route is useful when IV access is unavailable in actively seizing patients.", "key": "Medical Emergency Knowledge"},
  {"id": 86, "scen": "", "ask": "Which of the following medications is administered via the enteral route?", "opts": ["Aspirin", "Epinephrine", "Salbutamol", "Adrenaline IM"], "ans": "A", "ansText": "A. Aspirin", "exp": "Enteral route means administration through the gastrointestinal tract — this includes oral (PO), sublingual (SL), and rectal (PR). Aspirin is taken orally (swallowed/chewed) and absorbed through the GI tract. Epinephrine and adrenaline are given IM/IV (parenteral). Salbutamol is inhaled (neither enteral nor parenteral — it's topical/inhaled).", "key": "Medical Emergency Knowledge"},
  {"id": 87, "scen": "", "ask": "Which medication is administered via the parenteral route?", "opts": ["Epinephrine", "Ibuprofen", "Aspirin", "Paracetamol oral"], "ans": "A", "ansText": "A. Epinephrine", "exp": "Parenteral route means any route that bypasses the GI tract — this includes IV, IM, SC, IO, and transdermal. Epinephrine is given IM or IV (parenteral). Ibuprofen, aspirin, and oral paracetamol are all given orally (enteral route, through the GI tract).", "key": "Medical Emergency Knowledge"},
  {"id": 88, "scen": "", "ask": "An 18-year-old male is found unconscious at a public event. EMS initiates airway management and prepares for transport to the hospital. Two of his friends arrive at the scene and request to accompany him in the ambulance during transfer. What is the MOST appropriate response by the paramedic?", "opts": ["Allow both friends to accompany the patient in the ambulance for emotional support", "Allow one friend only if space is available in the patient compartment", "For safety and patient care, only EMS personnel will accompany the patient.", "Deny access and ask security to remove them forcibly from the scene"], "ans": "C", "ansText": "C. For safety and patient care, only EMS personnel will accompany the patient.", "exp": "For an unconscious patient, only essential EMS personnel should be in the patient compartment during transport. Friends/family, while well-intentioned, can interfere with patient care, take up critical space, become emotionally distressed, or create safety hazards during transport. This is a standard EMS protocol across all services.", "key": "Medical Emergency Knowledge"},
  {"id": 89, "scen": "", "ask": "A 6-year-old child is in pulseless ventricular fibrillation. Defibrillation is required. Choose the correct initial shock energy:", "opts": ["80 J", "200 J", "100 J", "120 J"], "ans": "A", "ansText": "A. 80 J", "exp": "Pediatric defibrillation energy: Initial shock = 4 J/kg. For a 6-year-old, approximate weight using the formula: weight (kg) = (age + 4) × 2 = (6 + 4) × 2 = 20 kg. Initial shock = 4 × 20 = 80 J. Subsequent shocks are also 4 J/kg (some protocols use up to 8-10 J/kg for refractory VF).", "key": "Medical Emergency Knowledge"},
  {"id": 90, "scen": "", "ask": "A 28-year-old motorcyclist is brought to the ED after a crash. He is alert but reports complete loss of sensation around the umbilicus and below it. Motor power in the legs is reduced, but upper-body sensation is intact. Which spinal dermatome level is MOST likely affected?", "opts": ["T8", "T9", "T10", "T12"], "ans": "C", "ansText": "C. T10", "exp": "The T10 dermatome corresponds to the umbilicus. Loss of sensation at and below the umbilicus with preserved upper body sensation indicates a spinal cord injury at the T10 level. Key dermatome landmarks: T4 = nipple line, T6 = xiphoid, T10 = umbilicus, T12 = inguinal region, L1 = groin.", "key": "Medical Emergency Knowledge"},
  {"id": 91, "scen": "", "ask": "A patient involved in a high-speed motor vehicle collision presents with a spider-web pattern windshield crack injury mechanism. On examination, the patient has bilateral periorbital ecchymosis and is confused. What is the most likely underlying injury?", "opts": ["Mandibular fracture", "Basilar skull fracture", "Orbital floor fracture", "Cervical spine strain"], "ans": "B", "ansText": "B. Basilar skull fracture", "exp": "Spider-web windshield cracking suggests the head struck the windshield with significant force. Bilateral periorbital ecchymosis (raccoon eyes) is a classic sign of basilar skull fracture — specifically an anterior fossa fracture. Other signs include CSF rhinorrhea, Battle's sign (mastoid ecchymosis), and cranial nerve palsies.", "key": "Medical Emergency Knowledge"},
  {"id": 92, "scen": "", "ask": "An asthma patient presents with wheezing and shortness of breath. The patient has already received 3 doses of salbutamol inhaler with no improvement. On paramedic arrival, 3 additional nebulized salbutamol doses were given, but there is still no change in the patient's condition. What is the MOST appropriate next management?", "opts": ["Magnesium sulfate", "Oxygen therapy only", "Continue nebulized salbutamol repeatedly", "Discharge with inhaler"], "ans": "A", "ansText": "A. Magnesium sulfate", "exp": "After multiple doses of salbutamol (total 6 doses) without improvement, this is life-threatening/near-fatal asthma. The next step is IV magnesium sulfate (2g IV over 20 minutes in adults). Magnesium acts as a smooth muscle relaxant and bronchodilator through a different mechanism than beta-agonists. Consider also IV aminophylline and prepare for intubation.", "key": "Medical Emergency Knowledge"},
  {"id": 93, "scen": "", "ask": "You arrive at a villa where a 68-year-old male slipped in the bathroom and struck his head on the floor. He is alert, complaining of neck pain, and denies numbness or tingling. What should the paramedic do according to the Canadian C-Spine Rule?", "opts": ["Allow him to walk to the stretcher", "Perform active neck rotation", "Apply C-spine precautions", "No immobilization needed"], "ans": "C", "ansText": "C. Apply C-spine precautions", "exp": "The Canadian C-Spine Rule: This 68-year-old patient is >65 years old (high-risk factor), has a dangerous mechanism (fall with head strike), and complains of neck pain. Any ONE high-risk factor mandates c-spine immobilization. Age >65 alone is sufficient to require precautions regardless of other findings.", "key": "Medical Emergency Knowledge"},
  {"id": 94, "scen": "", "ask": "A 34-year-old woman is brought to the ED after a minor side-impact crash. She is sitting comfortably, alert, and has no midline tenderness. She denies paresthesias. What does the CCR recommend?", "opts": ["Full spinal immobilization", "No C-spine immobilization required", "Immediate CT scan", "Apply collar and reassess in 30 minutes"], "ans": "B", "ansText": "B. No C-spine immobilization required", "exp": "The Canadian C-Spine Rule clears the c-spine if: (1) No high-risk factors (age >65, dangerous mechanism, paresthesias), (2) At least one low-risk factor allows safe assessment (simple rear-end MVC, sitting position, ambulatory, delayed onset pain, no midline tenderness), and (3) Patient can actively rotate neck 45° left and right. This patient meets all criteria for clearance.", "key": "Medical Emergency Knowledge"},
  {"id": 95, "scen": "", "ask": "A 78-year-old man lives alone. He reports difficulty walking long distances, needs help with shopping, and has several chronic medical conditions. He answers \"YES\" to multiple PRISMA-7 questions related to mobility, chronic illness, and needing assistance. What is the MOST appropriate management?", "opts": ["Refer to community centre", "Send to ED for immediate review", "No intervention required", "Refer to ICU for monitoring"], "ans": "A", "ansText": "A. Refer to community centre", "exp": "PRISMA-7 is a screening tool for frailty in elderly patients. A score ≥3 indicates frailty risk, warranting referral to community-based support services (community centre, social services, home care) for ongoing assessment and assistance. This is not an emergency requiring ED or ICU — it's a chronic functional decline requiring community-level support.", "key": "Medical Emergency Knowledge"},
  {"id": 96, "scen": "", "ask": "A 68-year-old patient presents with slurred speech and right-sided weakness. Blood glucose is 3.7 mmol/L. The patient has a previous history of stroke. What is the most appropriate management regarding transport?", "opts": ["Correct blood sugar before transport", "Transport to nearest clinic for observation", "Transport immediately to a stroke center", "Discharge home if symptoms improve"], "ans": "C", "ansText": "C. Transport immediately to a stroke center", "exp": "Stroke symptoms with low blood glucose (3.7 mmol/L) requires BOTH interventions, but transport to a stroke center should not be delayed. Hypoglycemia can mimic stroke, but with a history of previous stroke and current focal neurological deficits, the priority is rapid transport to a stroke center (time = brain). Blood glucose can be corrected en route.", "key": "Medical Emergency Knowledge"},
  {"id": 97, "scen": "", "ask": "A staff member has just received news that their father has passed away and becomes visibly distressed at work. What is the MOST appropriate support to provide?", "opts": ["Supervise and allow them to express their feelings with appropriate support", "Reassign their duties immediately without further assessment", "Offer reassurance only", "Provide a brief 5-minute break"], "ans": "A", "ansText": "A. Supervise and allow them to express their feelings with appropriate support", "exp": "When a colleague experiences acute grief (death of a parent), the most appropriate response is to provide emotional support in a supervised environment — allow them to express their feelings, offer empathy, and assess if they can safely continue working. Don't immediately reassign (feels dismissive) or offer only brief breaks. Monitor for signs that they need to go home.", "key": "Medical Emergency Knowledge"},
  {"id": 98, "scen": "", "ask": "A 45-year-old farmer is found confused, sweating profusely, with pinpoint pupils, excessive salivation, and wheezing after spraying pesticides. What is the MOST appropriate immediate medication?", "opts": ["Atropine", "Naloxone", "Flumazenil", "Activated charcoal"], "ans": "A", "ansText": "A. Atropine", "exp": "This is organophosphate poisoning (pesticide exposure) presenting with cholinergic crisis — the SLUDGE/DUMBELS mnemonic: Salivation, Lacrimation, Urination, Defecation, GI distress, Emesis / Diaphoresis, Urination, Miosis, Bradycardia, Bronchoconstriction, Emesis, Lacrimation, Salivation. Atropine is the antidote — it blocks excessive acetylcholine at muscarinic receptors. Pralidoxime (2-PAM) is also given to reactivate cholinesterase.", "key": "Medical Emergency Knowledge"},
  {"id": 99, "scen": "", "ask": "A 22-year-old woman presents 3 hours after ingesting a large amount of paracetamol following an argument. She is alert and has no symptoms. What is the MOST appropriate management?", "opts": ["Give activated charcoal only", "Start acetylcysteine immediately", "Observe for 24 hours", "Discharge home with advice"], "ans": "B", "ansText": "B. Start acetylcysteine immediately", "exp": "Paracetamol overdose >150 mg/kg (or >12g in adults) within the last 1-2 hours warrants activated charcoal. However, at 3 hours post-ingestion, charcoal is less effective. NAC (N-acetylcysteine) should be started immediately in staggered overdose or when the dose is potentially toxic. Blood levels and the Rumack-Matthew nomogram guide continued treatment at 4 hours post-ingestion.", "key": "Medical Emergency Knowledge"},
  {"id": 100, "scen": "", "ask": "A patient presents with signs of hemotoxic envenomation after a viper bite: bleeding from the site, low platelets, and prolonged clotting time. What is the correct initial dose of ASV?", "opts": ["2 vials IV over 1 hour", "10 vials IV infusion over 1 hour", "1 vial IM", "20 vials IM"], "ans": "B", "ansText": "B. 10 vials IV infusion over 1 hour", "exp": "For hemotoxic snake envenomation (coagulopathy, thrombocytopenia, bleeding), the initial dose of polyvalent anti-snake venom (ASV) is 10 vials reconstituted in normal saline, given as an IV infusion over 1 hour. The dose is the same for adults and children (based on venom load, not body weight). Additional doses may be needed based on clinical response.", "key": "Medical Emergency Knowledge"}

var QS2 = [{"id": 1, "scen": "", "ask": "You are called for a crowded, emotional residence where family blocks the doorway. What should you suspect?", "opts": ["Transport without further assessment", "Confirm scene safety and request help if needed", "Ignore the finding if the patient is awake", "Delay care until symptoms resolve"], "ans": "B", "ansText": "B. Confirm scene safety and request help if needed", "exp": "In any EMS call, scene safety is the first priority. A crowded, emotional environment with family members blocking access can indicate potential violence, substance use, or a chaotic scene. Always confirm scene safety, call for backup if needed, and never enter an unsafe scene. The safety of the provider must be ensured before any patient care can begin.", "key": "Nancy Caroline"}, {"id": 2, "scen": "", "ask": "You are called for a bystander asking for patient details after the call. Which intervention is most appropriate?", "opts": ["Delay care until symptoms resolve", "Ignore the finding if the patient is awake", "Protect patient confidentiality", "Complete paperwork before treatment"], "ans": "C", "ansText": "C. Protect patient confidentiality", "exp": "HIPAA (Health Insurance Portability and Accountability Act) protects patient health information. Bystanders, media, and non-involved individuals have no right to patient details. Sharing patient information without consent is a violation of confidentiality laws. Only share information with receiving medical personnel and authorized individuals involved in the patient's care.", "key": "Nancy Caroline"}, {"id": 3, "scen": "", "ask": "You are called for a competent adult refusing transport after risks are explained. What is the priority?", "opts": ["Give oral fluids immediately", "Transport without further assessment", "Ignore the finding if the patient is awake", "Respect informed refusal and document carefully"], "ans": "D", "ansText": "D. Respect informed refusal and document carefully", "exp": "A competent adult has the legal right to refuse medical treatment and transport, even if the refusal may result in harm or death. The provider must ensure the patient understands the risks, document the refusal thoroughly, advise the patient to call back if symptoms worsen, and obtain a witnessed signature when possible. This is informed refusal.", "key": "Nancy Caroline"}, {"id": 4, "scen": "", "ask": "You are called for traffic moving around a crash scene. Which finding or decision is most important?", "opts": ["Establish scene protection before patient care", "Transport without further assessment", "Delay care until symptoms resolve", "Ignore the finding if the patient is awake"], "ans": "A", "ansText": "A. Establish scene protection before patient care", "exp": "Traffic poses a significant danger at crash scenes. Establish scene protection using the ambulance as a barrier, activate warning lights, place cones/flares, and wear high-visibility vests before approaching patients. More EMS providers are killed by traffic incidents than any other line-of-duty cause.", "key": "Nancy Caroline"}, {"id": 5, "scen": "", "ask": "You are called for blood splashes into a provider eye. What is the best next action?", "opts": ["Ask the patient to walk to prove stability", "Irrigate and follow exposure reporting procedure", "Transport without further assessment", "Give oral fluids immediately"], "ans": "B", "ansText": "B. Irrigate and follow exposure reporting procedure", "exp": "Blood or body fluid exposure to mucous membranes (eyes, mouth) requires immediate irrigation with clean water or saline for at least 15-20 minutes. Report the exposure to your supervisor immediately, document the incident, seek medical evaluation, and follow your agency's exposure control plan. Post-exposure prophylaxis may be needed.", "key": "Nancy Caroline"}, {"id": 6, "scen": "", "ask": "You are called for a stroke alert radio report. What should you suspect?", "opts": ["Transport without further assessme backup if needed, and never enter an unsafe scene. The safety of the provider must be ensured before any patient care can begin.", "key": "Nancy Caroline"}, {"id": 17, "scen": "", "ask": "You are called for gurgling respirations after vomiting. Which intervention is most appropriate?", "opts": ["Suction and clear the airway", "Complete paperwork before treatment", "Ask the patient to walk to prove stability", "Give oral fluids immediately"], "ans": "A", "ansText": "A. Suction and clear the airway", "exp": "HIPAA (Health Insurance Portability and Accountability Act) protects patient health information. Bystanders, media, and non-involved individuals have no right to patient details. Sharing patient information without consent is a violation of confidentiality laws. Only share information with receiving medical personnel and authorized individuals involved in the patient's care.", "key": "Nancy Caroline"}, {"id": 18, "scen": "", "ask": "You are called for poor chest rise during BVM ventilation. What is the priority?", "opts": ["Ask the patient to walk to prove stability", "Reposition airway and improve mask seal", "Transport without further assessment", "Ignore the finding if the patient is awake"], "ans": "B", "ansText": "B. Reposition airway and improve mask seal", "exp": "A competent adult has the legal right to refuse medical treatment and transport, even if the refusal may result in harm or death. The provider must ensure the patient understands the risks, document the refusal thoroughly, advise the patient to call back if symptoms worsen, and obtain a witnessed signature when possible. This is informed refusal.", "key": "Nancy Caroline"}, {"id": 19, "scen": "", "ask": "You are called for slow shallow breathing at 6/min. Which finding or decision is most important?", "opts": ["Transport without further assessment", "Delay care until symptoms resolve", "Assist ventilations", "Complete paperwork before treatment"], "ans": "C", "ansText": "C. Assist ventilations", "exp": "Traffic poses a significant danger at crash scenes. Establish scene protection using the ambulance as a barrier, activate warning lights, place cones/flares, and wear high-visibility vests before approaching patients. More EMS providers are killed by traffic incidents than any other line-of-duty cause.", "key": "Nancy Caroline"}, {"id": 20, "scen": "", "ask": "You are called for airway swelling after allergic reaction. What is the best next action?", "opts": ["Transport without further assessment", "Delay care until symptoms resolve", "Give oral fluids immediately", "Treat as impending airway compromise"], "ans": "D", "ansText": "D. Treat as impending airway compromise", "exp": "Blood or body fluid exposure to mucous membranes (eyes, mouth) requires immediate irrigation with clean water or saline for at least 15-20 minutes. Report the exposure to your supervisor immediately, document the incident, seek medical evaluation, and follow your agency's exposure control plan. Post-exposure prophylaxis may be needed.", "key": "Nancy Caroline"}, {"id": 21, "scen": "", "ask": "You are called for asthma with accessory muscle use and short speech. What should you suspect?", "opts": ["Delay care until symptoms resolve", "Recognize severe respiratory distress", "Give oral fluids immediately", "Transport without further assessment"], "ans": "B", "ansText": "B. Recognize severe respiratory distress", "exp": "In any EMS call, scene safety is the first priority. A crowded, emotional environment with family members blocking access can indicate potential violence, substance use, or a chaotic scene. Always confirm scene safety, call for backup if needed, and never enter an unsafe scene. The safety of the provider must be ensured before any patient care can begin.", "key": "Nancy Caroline"}, {"id": 22, "scen": "", "ask": "You are called for COPD patient drowsy with shallow respirations. Which intervention is most appropriate?", "opts": ["Complete paperwork before treatment", "Ignore the finding if the patient is awake", "Support ventilation and oxygenation", "Ask the patient to walk to prove stability"], "ans": "C", "ansText": "C. Support ventilation and oxygenation", "exp": "HIPAA (Health Insurance Portability and Accountability Act) protects patient health information. Bystanders, media, and non-involved individuals have no right to patient details. Sharing patient information without consent is a violation of confidentiality laws. Only share information with receiving medical personnel and authorized individuals involved in the patient's care.", "key": "Nancy Caroline"}, {"id": 23, "scen": "", "ask": "You are called for sudden dyspnea after surgery with pleuritic pain. What is the priority?", "opts": ["Ignore the finding if the patient is awake", "Transport without further assessment", "Complete paperwork before treatment", "Suspect pulmonary embolism"], "ans": "D", "ansText": "D. Suspect pulmonary embolism", "exp": "A competent adult has the legal right to refuse medical treatment and transport, even if the refusal may result in harm or death. The provider must ensure the patient understands the risks, document the refusal thoroughly, advise the patient to call back if symptoms worsen, and obtain a witnessed signature when possible. This is informed refusal.", "key": "Nancy Caroline"}, {"id": 24, "scen": "", "ask": "You are called for pink frothy sputum and crackles. Which finding or decision is most important?", "opts": ["Consider pulmonary edema and CPAP per protocol", "Ignore the finding if the patient is awake", "Complete paperwork before treatment", "Transport without further assessment"], "ans": "A", "ansText": "A. Consider pulmonary edema and CPAP per protocol", "exp": "Traffic poses a significant danger at crash scenes. Establish scene protection using the ambulance as a barrier, activate warning lights, place cones/flares, and wear high-visibility vests before approaching patients. More EMS providers are killed by traffic incidents than any other line-of-duty cause.", "key": "Nancy Caroline"}, {"id": 25, "scen": "", "ask": "You are called for silent chest in severe asthma. What is the best next action?", "opts": ["Delay care until symptoms resolve", "Recognize critically poor air movement", "Give oral fluids immediately", "Ask the patient to walk to prove stability"], "ans": "B", "ansText": "B. Recognize critically poor air movement", "exp": "Blood or body fluid exposure to mucous membranes (eyes, mouth) requires immediate irrigation with clean water or saline for at least 15-20 minutes. Report the exposure to your supervisor immediately, document the incident, seek medical evaluation, and follow your agency's exposure control plan. Post-exposure prophylaxis may be needed.", "key": "Nancy Caroline"}, {"id": 26, "scen": "", "ask": "You are called for crushing chest pain with diaphoresis and nausea. What should you suspect?", "opts": ["Transport without further assessment", "Complete paperwork before treatment", "Suspect acute coronary syndrome", "Delay care until symptoms resolve"], "ans": "C", "ansText": "C. Suspect acute coronary syndrome", "exp": "For stroke alerts, the most critical information is the last known well time (determines eligibility for thrombolytics — must be within 3-4.5 hours) and specific neurologic deficits (facial droop, arm drift, speech abnormality). Use a validated stroke scale (Cincinnati, FAST, LAMS). Pre-notification allows the stroke team to prepare.", "key": "Nancy Caroline"}, {"id": 27, "scen": "", "ask": "You are called for recent sildenafil use with chest pain. Which intervention is most appropriate?", "opts": ["Complete paperwork before treatment", "Delay care until symptoms resolve", "Transport without further assessment", "Avoid nitroglycerin unless protocol permits"], "ans": "D", "ansText": "D. Avoid nitroglycerin unless protocol permits", "exp": "When patients have limited English proficiency, use professional medical interpreters (in-person, phone, or y an occlusive dressing"], "ans": "D", "ansText": "D. Apply an occlusive dressing", "exp": "When patients have limited English proficiency, use professional medical interpreters (in-person, phone, or video). Avoid using family members (especially children) as interpreters due to accuracy concerns, emotional bias, and privacy issues. Clear communication is essential for obtaining accurate history, informed consent, and proper treatment.", "key": "Nancy Caroline"}, {"id": 48, "scen": "", "ask": "You are called for paradoxical chest wall movement. What is the priority?", "opts": ["Suspect flail chest", "Delay care until symptoms resolve", "Ignore the finding if the patient is awake", "Transport without further assessment"], "ans": "A", "ansText": "A. Suspect flail chest", "exp": "When the history is uncertain (e.g., seizure vs. syncope), document only what was directly witnessed or reported. Avoid making unsupported diagnostic conclusions. Record objective findings: duration of event, movements observed, incontinence, post-event confusion, and vital signs. Let the hospital team make the definitive diagnosis.", "key": "Nancy Caroline"}, {"id": 49, "scen": "", "ask": "You are called for abdominal evisceration. Which finding or decision is most important?", "opts": ["Delay care until symptoms resolve", "Cover with moist sterile dressing and occlusive covering", "Ignore the finding if the patient is awake", "Complete paperwork before treatment"], "ans": "B", "ansText": "B. Cover with moist sterile dressing and occlusive covering", "exp": "Every medication administration must be documented with: drug name, dose given, route of administration, time administered, and patient's response (improvement, no change, adverse effects). This is both a legal requirement and essential for continuity of care during hospital handoff.", "key": "Nancy Caroline"}, {"id": 50, "scen": "", "ask": "You are called for pelvic fracture with hypotension. What is the best next action?", "opts": ["Ign r slow respirations and pinpoint pupils. Which finding or decision is most important?", "opts": ["Ignore the finding if the patient is awake", "Complete paperwork before treatment", "Delay care until symptoms resolve", "Suspect opioid overdose and support breathing"], "ans": "D", "ansText": "D. Suspect opioid overdose and support breathing", "exp": "Post-surgical patients are at high risk for pulmonary embolism due to immobility, venous stasis, and hypercoagulability (Virchow's triad). Sudden onset dyspnea with pleuritic chest pain (sharp, worse with breathing) in a post-surgical patient should be presumed PE until proven otherwise. Provide oxygen and transport urgently.", "key": "Nancy Caroline"}, {"id": 104, "scen": "", "ask": "You are called for carbon monoxide exposure with headache and nausea. What is the best next action?", "opts": ["Remove from exposure and give high-concentration oxygen", "Transport without further assessment", "Complete paperwork before treatment", "Give oral fluids immediately"], "ans": "A", "ansText": "A. Remove from exposure and give high-concentration oxygen", "exp": "Pink frothy sputum with bilateral crackles on auscultation is classic for acute pulmonary edema (often from left heart failure). CPAP (Continuous Positive Airway Pressure) improves oxygenation by providing positive end-expiratory pressure that pushes fluid out of alveoli and reduces preload. Administer per protocol along with nitroglycerin if indicated.", "key": "Nancy Caroline"}, {"id": 105, "scen": "", "ask": "You are called for unknown pill ingestion. What should you suspect?", "opts": ["Give oral fluids immediately", "Contact poison control or medical direction", "Complete paperwork before treatment", "Delay care until symptoms resolve"], "ans": "B", "ansText": "B. Contact poison control or medical direction", "exp": "In severe asthma, a silent chest (absence of wheezing) is an ominous sign indicating such severe bronchospasm that there is virtually no air movement. Th n": "", "ask": "You are called for crushing chest pain with diaphoresis and nausea. Which finding or decision is most important?", "opts": ["Delay care until symptoms resolve", "Suspect acute coronary syndrome", "Complete paperwork before treatment", "Ask the patient to walk to prove stability"], "ans": "B", "ansText": "B. Suspect acute coronary syndrome", "exp": "Compensated shock occurs when the body's compensatory mechanisms (tachycardia, vasoconstriction, increased contractility) maintain blood pressure despite reduced cardiac output. Signs include tachycardia, anxiety/restlessness, cool clammy skin, and delayed capillary refill — while blood pressure remains normal. Recognize and treat early before decompensation occurs.", "key": "Nancy Caroline"}, {"id": 222, "scen": "", "ask": "You are called for recent sildenafil use with chest pain. What is the best next action?", "opts": ["Ignore the finding if the patient is awake", "Transport without further assessment", "Avoid nitroglycerin unless protocol permits", "Delay care until symptoms resolve"], "ans": "C", "ansText": "C. Avoid nitroglycerin unless protocol permits", "exp": "Neurogenic shock results from spinal cord injury that disrupts sympathetic nervous system signals, causing loss of vascular tone (vasodilation = warm, dry skin) and loss of sympathetic cardiac stimulation (bradycardia or inappropriate heart rate). Unlike hypovolemic shock, the skin is warm and dry. Treat with IV fluids and vasopressors as needed.", "key": "Nancy Caroline"}, {"id": 223, "scen": "", "ask": "You are called for pulseless ventricular fibrillation. What should you suspect?", "opts": ["Complete paperwork before treatment", "Ignore the finding if the patient is awake", "Delay care until symptoms resolve", "Perform CPR and defibrillate"], "ans": "D", "ansText": "D. Perform CPR and defibrillate", "exp": "Septic shock is a form of distributive shock caused by overwhelming infection. Systemic vasodilation and capillary leak lead to hypo var activeQS = QS; // will be set by set selection
var activeSetName = 'DOH Repeat';


var userMilitaryID = '';
var eState = { answered:0, correct:0, wrong:0, done:{}, completed: false };

function syncToCloud(type, data, score, pct, grade) {
  var syncId = userMilitaryID + '_' + activeSetName;
  var params = 'type=' + encodeURIComponent(type) +
    '&id=' + encodeURIComponent(syncId) +
    '&data=' + encodeURIComponent(data != null ? data : '') +
    '&score=' + encodeURIComponent(score != null ? String(score) : '') +
    '&pct=' + encodeURIComponent(pct != null ? String(pct) : '') +
    '&grade=' + encodeURIComponent(grade != null ? grade : '');
  cloudRequest(params, function(response, err) {
    if (err) { console.warn('Sync ' + type + ' error:', err); }
    else { console.log('Sync ' + type + ' OK:', syncId); }
  }, 20000);
}

// ===== JSONP helper: inject <script> tag to load data from Google Apps Script =====
var _jsonpCounter = 0;

function cloudRequest(params, callback, timeout) {
  timeout = timeout || 12000;
  var baseUrl = APPS_SCRIPT_URL + '?' + params;
  var url = baseUrl + '&_t=' + Date.now();
  var done = false;

  function finish(data, err) {
    if (!done) { done = true; callback(data, err); }
  }

  // Safety timeout
  var timer = setTimeout(function() { 
    finish(null, 'timeout'); 
  }, timeout);

  // === METHOD 1: fetch (best for hosted sites) ===
  if (window.fetch) {
    fetch(url, { redirect: 'follow' })
      .then(function(r) { 
        if (!r.ok) throw new Error('HTTP ' + r.status); 
        return r.json(); 
      })
      .then(function(data) { 
        clearTimeout(timer); 
        finish(data, null); 
      })
      .catch(function(fetchErr) {
        console.warn('fetch failed:', fetchErr.message, '- trying JSONP');
        tryJSONPFallback(baseUrl, timer, finish);
      });
  } else {
    // No fetch available, go to JSONP
    tryJSONPFallback(baseUrl, timer, finish);
  }
}

function tryJSONPFallback(baseUrl, timer, finish) {
  var cbName = '_cb_' + (++_jsonpCounter) + '_' + Date.now();
  var script = document.createElement('script');
  var jpDone = false;

  window[cbName] = function(data) {
    if (!jpDone) {
      jpDone = true;
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(e) {}
      finish(data, null);
    }
  };

  script.src = baseUrl + '&callback=' + cbName + '&_t=' + Date.now();
  script.onerror = function() {
    if (!jpDone) {
      jpDone = true;
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(e) {}
      // Last resort: XHR
      tryXHRFallback(baseUrl + '&_t=' + Date.now(), timer, finish);
    }
  };
  document.head.appendChild(script);
}

function tryXHRFallback(url, timer, finish) {
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 8000;
    xhr.onload = function() {
      try {
        clearTimeout(timer);
        finish(JSON.parse(xhr.responseText), null);
      } catch(e) {
        clearTimeout(timer);
        finish(null, 'parse error');
      }
    };
    xhr.onerror = function() { clearTimeout(timer); finish(null, 'xhr error'); };
    xhr.ontimeout = function() { clearTimeout(timer); finish(null, 'xhr timeout'); };
    xhr.send();
  } catch(e) {
    clearTimeout(timer);
    finish(null, 'xhr exception');
  }
}


function selectSet(setNum) {
  if (setNum === 1) {
    activeQS = QS;
    activeSetName = 'DOH Repeat';
  } else {
    activeQS = QS2;
    activeSetName = 'Nancy Caroline';
  }
  
  // Hide set selection
  document.getElementById('setOverlay').style.display = 'none';
  
  // Show user badge
  document.getElementById('userBadge').textContent = '\ud83c\udf96 ID: ' + userMilitaryID + ' | \ud83d\udcda ' + activeSetName;
  document.getElementById('userBadge').style.display = 'inline-block';
  
  // Reset exam state
  eState = { answered:0, correct:0, wrong:0, done:{}, completed: false };
  
  // Load saved progress for this set (non-blocking)
  cloudRequest('type=fetchState&id=' + encodeURIComponent(userMilitaryID + '_' + activeSetName), function(data, err) {
    if (data && data.completed) {
      eState.completed = true;
      eState.correct = data.score;
      showResults(true);
    } else {
      if (data && data.progress) {
        try {
          eState.done = JSON.parse(data.progress);
          eState.answered = 0; eState.correct = 0; eState.wrong = 0;
          Object.values(eState.done).forEach(function(v) {
            eState.answered++;
            if (v.isOk) eState.correct++; else eState.wrong++;
          });
        } catch(e) {}
      }
      buildExam();
      updateExamScore();
    }
  }, 10000);
  
  // Build exam immediately (progress will update when cloudRequest returns)
  buildExam();
  updateExamScore();
}

function submitReg() {
  var idVal = document.getElementById('regMilitaryID').value.trim();
  if (authorizedIDs.indexOf(idVal) === -1) { alert("Unauthorized ID. Please check your Military ID."); return; }
  userMilitaryID = idVal;
  
  // Hide login, show set selection
  document.getElementById('regOverlay').style.display = 'none';
  document.getElementById('setOverlay').style.display = 'flex';
}

function buildExam() {
  var container = document.getElementById('examQs');
  container.innerHTML = '';

  // === SHUFFLE QUESTIONS (keeping linked groups together) ===
  var linkedGroups = []; // All questions now independent (scenarios copied to each)
  var linkedIds = {};
  linkedGroups.forEach(function(grp) {
    grp.forEach(function(id) { linkedIds[id] = grp[0]; });
  });

  var singles = [];
  var groups = {};
  activeQS.forEach(function(q) {
    if (linkedIds[q.id]) {
      var leader = linkedIds[q.id];
      if (!groups[leader]) groups[leader] = [];
      groups[leader].push(q);
    } else {
      singles.push(q);
    }
  });

  var units = [];
  singles.forEach(function(q) { units.push([q]); });
  Object.keys(groups).forEach(function(leader) {
    groups[leader].sort(function(a,b){ return a.id - b.id; });
    units.push(groups[leader]);
  });

  // Shuffle units (Fisher-Yates)
  for (var i = units.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = units[i]; units[i] = units[j]; units[j] = temp;
  }

  var shuffledQS = [];
  units.forEach(function(unit) {
    unit.forEach(function(q) { shuffledQS.push(q); });
  });

  // === BUILD EACH QUESTION CARD ===
  var displayNum = 0;
  shuffledQS.forEach(function(q) {
    displayNum++;
    var card = document.createElement('div');
    card.className = 'q-card';

    var LTRS = ['A','B','C','D'];

    // === SHUFFLE OPTIONS ===
    var optObjs = q.opts.map(function(text, i) {
      return { text: text, origLetter: LTRS[i] };
    });
    // Fisher-Yates shuffle
    for (var i = optObjs.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = optObjs[i]; optObjs[i] = optObjs[j]; optObjs[j] = tmp;
    }

    // Find the NEW correct answer letter after shuffle
    var newAns = '';
    var newAnsText = '';
    optObjs.forEach(function(opt, i) {
      if (opt.origLetter === q.ans) {
        newAns = LTRS[i];
        newAnsText = LTRS[i] + '. ' + opt.text;
      }
    });

    var optsHTML = optObjs.map(function(opt, i) {
      return '<div class="opt" data-opt="' + LTRS[i] + '"><div class="opt-ltr">' + LTRS[i] + '</div><span>' + opt.text + '</span></div>';
    }).join('');

    card.innerHTML =
      '<div class="q-head"><div class="q-num" id="qnum-' + q.id + '">' + displayNum + '</div><div class="q-scen">' + q.scen + '</div></div>' +
      '<div class="q-ask">' + q.ask + '</div><div class="opts">' + optsHTML + '</div>' +
      '<div class="result-banner" id="eres-' + q.id + '"></div>' +
      '<div class="expbox" id="eexp-' + q.id + '"><div class="exp-top">\u2705 Explanation</div><div class="exp-body"><b>' + newAnsText + '</b><br>' + q.exp + '</div></div>';
    container.appendChild(card);

    // Store the shuffled correct answer
    card._shuffledAns = newAns;

    // If already answered (restored from progress), show it
    if (eState.done[q.id]) {
      applyUIShuffled(card, newAns, eState.done[q.id].chosen, eState.done[q.id].isOk);
    }

    card.querySelectorAll('.opt').forEach(function(opt) {
      opt.onclick = function() {
        if (eState.done[q.id] || eState.completed) return;
        var chosen = this.dataset.opt;
        var isOk = chosen === card._shuffledAns;
        eState.done[q.id] = { chosen: chosen, isOk: isOk };
        isOk ? eState.correct++ : eState.wrong++;
        eState.answered++;
        applyUIShuffled(card, card._shuffledAns, chosen, isOk);
        updateExamScore();
        syncToCloud('progress', JSON.stringify(eState.done));
        if (eState.answered === activeQS.length) { eState.completed = true; setTimeout(showResults, 600); }
      };
    });
  });
}

function applyUIShuffled(card, correctAns, chosen, isOk) {
  card.querySelectorAll('.opt').forEach(function(o) {
    o.classList.add('done');
    if (o.dataset.opt === correctAns) o.classList.add('right');
    if (o.dataset.opt === chosen && !isOk) o.classList.add('wrong');
  });
  card.classList.add(isOk ? 'answered-ok' : 'answered-bad');
  card.querySelector('.q-num').classList.add(isOk ? 'ok' : 'bad');
  var expEl = card.querySelector('.expbox');
  if (expEl) expEl.classList.add('show');
}

function applyUI(card, q, chosen, isOk) {
  card.querySelectorAll('.opt').forEach(function(o) {
    o.classList.add('done');
    if (o.dataset.opt === q.ans) o.classList.add('right');
    if (o.dataset.opt === chosen && !isOk) o.classList.add('wrong');
  });
  card.classList.add(isOk ? 'answered-ok' : 'answered-bad');
  card.querySelector('.q-num').classList.add(isOk ? 'ok' : 'bad');
  var expEl = card.querySelector('.expbox');
  if (expEl) expEl.classList.add('show');
}

function updateExamScore() {
  document.getElementById('eAns').textContent = eState.answered;
  document.getElementById('eCorr').textContent = eState.correct;
  document.getElementById('ePct').textContent = Math.round((eState.correct/activeQS.length)*100) + '%';
}

function showResults(isResume) {
  var pct = Math.round((eState.correct / activeQS.length) * 100);
  document.getElementById('resultsPanel').classList.add('show');
  document.getElementById('finalPct').textContent = pct + '%';
  document.getElementById('rGrade').textContent = pct >= 80 ? 'PASS' : 'FAIL';
  document.getElementById('rGrade').className = 'grade ' + (pct >= 80 ? 'gA' : 'gF');
  if (!isResume) syncToCloud('score', null, eState.correct, pct, pct >= 80 ? 'PASS' : 'FAIL');
}

function toggleModal(id) { 
  document.getElementById(id).classList.toggle('open'); 
  if(id === 'sbModal') renderScoreboard();
}

function renderScoreboard() {
  var list = document.getElementById('sbList');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:#7f8c8d;">Loading scores...</div>';
  var titleEl = document.getElementById('sbTitle');
  if (titleEl) titleEl.textContent = '\ud83c\udfc6 ' + (activeSetName || 'Leaderboard');

  cloudRequest('type=getScores', function(data, err) {
    var currentSet = activeSetName || 'DOH Repeat';
    if (err || !data) {
      list.innerHTML = '<div style="text-align:center;padding:20px;">' +
        '<div style="font-size:2rem;">⚠️</div>' +
        '<b style="color:var(--accent);">Leaderboard Unavailable</b><br>' +
        '<span style="color:#555;font-size:0.85rem;">(' + (err || 'No data') + ')</span><br><br>' +
        '<button onclick="renderScoreboard()" style="padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 Retry</button>' +
        '</div>';
      return;
    }
    displayScores(data, list, currentSet);
  });
}

function displayScores(data, list, filterSet) {
  var html = '';
  var allScores = data.scores || data.data || [];
  // Filter scores by current set
  var scores = [];
  if (filterSet && allScores) {
    allScores.forEach(function(s) {
      var sid = (s.mobile || s.id || s.name || '').toString();
      if (sid.indexOf('_' + filterSet) !== -1) {
        scores.push(s);
      }
    });
  } else {
    scores = allScores || [];
  }
  if (!scores || scores.length === 0) { list.innerHTML = '<div style="text-align:center;padding:20px;color:#7f8c8d;">No scores yet for ' + (filterSet || 'this set') + '.</div>'; return; }
  var seen = {};
  scores.forEach(function(s) {
    var key = (s.mobile || s.id || s.name || 'unknown').toString().trim();
    var rawName = s.name || s.id || s.mobile || 'Unknown';
    var name = rawName.replace('_DOH Repeat', '').replace('_Nancy Caroline', '');
    var pct = Number(s.pct) || 0;
    var grade = s.grade || (pct >= 80 ? 'PASS' : 'FAIL');
    if (!seen[key]) seen[key] = { name: name, pct: pct, grade: grade };
    else {
      if (pct > seen[key].pct) { seen[key].pct = pct; seen[key].name = name; seen[key].grade = grade; }
    }
  });
  var sorted = Object.values(seen).sort(function(a,b){ return b.pct - a.pct; });
  var rank = 0;
  sorted.forEach(function(s) {
    rank++;
    var medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '#' + rank;
    var pctColor = s.pct >= 80 ? 'var(--green)' : 'var(--accent)';
    var gradeTag = s.grade === 'PASS'
      ? '<span style="background:#27ae60;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:bold;">PASS</span>'
      : '<span style="background:#e74c3c;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:bold;">FAIL</span>';
    html += '<div class="sb-row" style="align-items:center;padding:14px 12px;">' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:1.3rem;min-width:28px;text-align:center;">' + medal + '</span>' +
        '<div><b style="font-size:0.95rem;">' + s.name + '</b></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        gradeTag +
        '<span style="font-size:1.2rem;font-weight:bold;color:' + pctColor + ';min-width:45px;text-align:right;">' + s.pct + '%</span>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = html;
