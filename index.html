var userMilitaryID = '';
var eState = { answered:0, correct:0, wrong:0, done:{}, completed: false };

function syncToCloud(type, data, score, pct, grade) {
  var params = 'type=' + encodeURIComponent(type) +
    '&id=' + encodeURIComponent(userMilitaryID) +
    '&data=' + encodeURIComponent(data != null ? data : '') +
    '&score=' + encodeURIComponent(score != null ? String(score) : '') +
    '&pct=' + encodeURIComponent(pct != null ? String(pct) : '') +
    '&grade=' + encodeURIComponent(grade != null ? grade : '');
  cloudRequest(params, function(response, err) {
    if (err) { console.warn('Sync ' + type + ' error:', err); }
    else { console.log('Sync ' + type + ' OK'); }
  }, 20000);
}

// ===== JSONP helper: inject <script> tag to load data from Google Apps Script =====
var _jsonpCounter = 0;

function cloudRequest(params, callback, timeout) {
  timeout = timeout || 12000;
  var baseUrl = APPS_SCRIPT_URL + '?' + params;
  var url = baseUrl + '&_t=' + Date.now();
  var done = false;

  function finish(data, err) {
    if (!done) { done = true; callback(data, err); }
  }

  // Safety timeout
  var timer = setTimeout(function() { 
    finish(null, 'timeout'); 
  }, timeout);

  // === METHOD 1: fetch (best for hosted sites) ===
  if (window.fetch) {
    fetch(url, { redirect: 'follow' })
      .then(function(r) { 
        if (!r.ok) throw new Error('HTTP ' + r.status); 
        return r.json(); 
      })
      .then(function(data) { 
        clearTimeout(timer); 
        finish(data, null); 
      })
      .catch(function(fetchErr) {
        console.warn('fetch failed:', fetchErr.message, '- trying JSONP');
        tryJSONPFallback(baseUrl, timer, finish);
      });
  } else {
    // No fetch available, go to JSONP
    tryJSONPFallback(baseUrl, timer, finish);
  }
}

function tryJSONPFallback(baseUrl, timer, finish) {
  var cbName = '_cb_' + (++_jsonpCounter) + '_' + Date.now();
  var script = document.createElement('script');
  var jpDone = false;

  window[cbName] = function(data) {
    if (!jpDone) {
      jpDone = true;
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(e) {}
      finish(data, null);
    }
  };

  script.src = baseUrl + '&callback=' + cbName + '&_t=' + Date.now();
  script.onerror = function() {
    if (!jpDone) {
      jpDone = true;
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(e) {}
      // Last resort: XHR
      tryXHRFallback(baseUrl + '&_t=' + Date.now(), timer, finish);
    }
  };
  document.head.appendChild(script);
}

function tryXHRFallback(url, timer, finish) {
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 8000;
    xhr.onload = function() {
      try {
        clearTimeout(timer);
        finish(JSON.parse(xhr.responseText), null);
      } catch(e) {
        clearTimeout(timer);
        finish(null, 'parse error');
      }
    };
    xhr.onerror = function() { clearTimeout(timer); finish(null, 'xhr error'); };
    xhr.ontimeout = function() { clearTimeout(timer); finish(null, 'xhr timeout'); };
    xhr.send();
  } catch(e) {
    clearTimeout(timer);
    finish(null, 'xhr exception');
  }
}

function submitReg() {
  var idVal = document.getElementById('regMilitaryID').value.trim();
  if (authorizedIDs.indexOf(idVal) === -1) { alert("Unauthorized ID. Please check your Military ID."); return; }
  userMilitaryID = idVal;
  var btn = document.getElementById('loginBtn');
  btn.textContent = 'Loading...'; btn.disabled = true;
  document.getElementById('syncMsg').style.display = 'block';
  document.getElementById('syncMsg').textContent = 'Connecting to server...';

  function enterExam(data) {
    btn.textContent = '🚀 Enter Exam'; btn.disabled = false;
    document.getElementById('syncMsg').style.display = 'none';
    document.getElementById('regOverlay').style.display = 'none';
    document.getElementById('userBadge').textContent = '🎖 ID: ' + userMilitaryID;
    document.getElementById('userBadge').style.display = 'inline-block';

    if (data && data.completed) {
      eState.completed = true; eState.correct = data.score;
      showResults(true);
    } else {
      if (data && data.progress) {
        try {
          eState.done = JSON.parse(data.progress);
          eState.answered = 0; eState.correct = 0; eState.wrong = 0;
          Object.values(eState.done).forEach(function(v) { eState.answered++; if(v.isOk) eState.correct++; else eState.wrong++; });
        } catch(e) { console.error("Parse error", e); }
      }
      buildExam(); updateExamScore();
    }
  }

  cloudRequest('type=fetchState&id=' + encodeURIComponent(idVal), function(data, err) {
    if (err) { console.warn('fetchState failed:', err, '- entering exam anyway'); }
    enterExam(data);
  }, 10000);
}

function buildExam() {
  var container = document.getElementById('examQs');
  container.innerHTML = '';

  // === SHUFFLE QUESTIONS (keeping linked groups together) ===
  var linkedGroups = []; // All questions now independent (scenarios copied to each)
  var linkedIds = {};
  linkedGroups.forEach(function(grp) {
    grp.forEach(function(id) { linkedIds[id] = grp[0]; });
  });

  var singles = [];
  var groups = {};
  QS.forEach(function(q) {
    if (linkedIds[q.id]) {
      var leader = linkedIds[q.id];
      if (!groups[leader]) groups[leader] = [];
      groups[leader].push(q);
    } else {
      singles.push(q);
    }
  });

  var units = [];
  singles.forEach(function(q) { units.push([q]); });
  Object.keys(groups).forEach(function(leader) {
    groups[leader].sort(function(a,b){ return a.id - b.id; });
    units.push(groups[leader]);
  });

  // Shuffle units (Fisher-Yates)
  for (var i = units.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = units[i]; units[i] = units[j]; units[j] = temp;
  }

  var shuffledQS = [];
  units.forEach(function(unit) {
    unit.forEach(function(q) { shuffledQS.push(q); });
  });

  // === BUILD EACH QUESTION CARD ===
  var displayNum = 0;
  shuffledQS.forEach(function(q) {
    displayNum++;
    var card = document.createElement('div');
    card.className = 'q-card';

    var LTRS = ['A','B','C','D'];

    // === SHUFFLE OPTIONS ===
    var optObjs = q.opts.map(function(text, i) {
      return { text: text, origLetter: LTRS[i] };
    });
    // Fisher-Yates shuffle
    for (var i = optObjs.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = optObjs[i]; optObjs[i] = optObjs[j]; optObjs[j] = tmp;
    }

    // Find the NEW correct answer letter after shuffle
    var newAns = '';
    var newAnsText = '';
    optObjs.forEach(function(opt, i) {
      if (opt.origLetter === q.ans) {
        newAns = LTRS[i];
        newAnsText = LTRS[i] + '. ' + opt.text;
      }
    });

    var optsHTML = optObjs.map(function(opt, i) {
      return '<div class="opt" data-opt="' + LTRS[i] + '"><div class="opt-ltr">' + LTRS[i] + '</div><span>' + opt.text + '</span></div>';
    }).join('');

    card.innerHTML =
      '<div class="q-head"><div class="q-num" id="qnum-' + q.id + '">' + displayNum + '</div><div class="q-scen">' + q.scen + '</div></div>' +
      '<div class="q-ask">' + q.ask + '</div><div class="opts">' + optsHTML + '</div>' +
      '<div class="result-banner" id="eres-' + q.id + '"></div>' +
      '<div class="expbox" id="eexp-' + q.id + '"><div class="exp-top">\u2705 Explanation</div><div class="exp-body"><b>' + newAnsText + '</b><br>' + q.exp + '</div></div>';
    container.appendChild(card);

    // Store the shuffled correct answer
    card._shuffledAns = newAns;

    // If already answered (restored from progress), show it
    if (eState.done[q.id]) {
      applyUIShuffled(card, newAns, eState.done[q.id].chosen, eState.done[q.id].isOk);
    }

    card.querySelectorAll('.opt').forEach(function(opt) {
      opt.onclick = function() {
        if (eState.done[q.id] || eState.completed) return;
        var chosen = this.dataset.opt;
        var isOk = chosen === card._shuffledAns;
        eState.done[q.id] = { chosen: chosen, isOk: isOk };
        isOk ? eState.correct++ : eState.wrong++;
        eState.answered++;
        applyUIShuffled(card, card._shuffledAns, chosen, isOk);
        updateExamScore();
        syncToCloud('progress', JSON.stringify(eState.done));
        if (eState.answered === QS.length) { eState.completed = true; setTimeout(showResults, 600); }
      };
    });
  });
}

function applyUIShuffled(card, correctAns, chosen, isOk) {
  card.querySelectorAll('.opt').forEach(function(o) {
    o.classList.add('done');
    if (o.dataset.opt === correctAns) o.classList.add('right');
    if (o.dataset.opt === chosen && !isOk) o.classList.add('wrong');
  });
  card.classList.add(isOk ? 'answered-ok' : 'answered-bad');
  card.querySelector('.q-num').classList.add(isOk ? 'ok' : 'bad');
  var expEl = card.querySelector('.expbox');
  if (expEl) expEl.classList.add('show');
}

function applyUI(card, q, chosen, isOk) {
  card.querySelectorAll('.opt').forEach(function(o) {
    o.classList.add('done');
    if (o.dataset.opt === q.ans) o.classList.add('right');
    if (o.dataset.opt === chosen && !isOk) o.classList.add('wrong');
  });
  card.classList.add(isOk ? 'answered-ok' : 'answered-bad');
  card.querySelector('.q-num').classList.add(isOk ? 'ok' : 'bad');
  var expEl = card.querySelector('.expbox');
  if (expEl) expEl.classList.add('show');
}

function updateExamScore() {
  document.getElementById('eAns').textContent = eState.answered;
  document.getElementById('eCorr').textContent = eState.correct;
  document.getElementById('ePct').textContent = Math.round((eState.correct/QS.length)*100) + '%';
}

function showResults(isResume) {
  var pct = Math.round((eState.correct / QS.length) * 100);
  document.getElementById('resultsPanel').classList.add('show');
  document.getElementById('finalPct').textContent = pct + '%';
  document.getElementById('rGrade').textContent = pct >= 80 ? 'PASS' : 'FAIL';
  document.getElementById('rGrade').className = 'grade ' + (pct >= 80 ? 'gA' : 'gF');
  if (!isResume) syncToCloud('score', null, eState.correct, pct, pct >= 80 ? 'PASS' : 'FAIL');
}

function toggleModal(id) { 
  document.getElementById(id).classList.toggle('open'); 
  if(id === 'sbModal') renderScoreboard();
}

function renderScoreboard() {
  var list = document.getElementById('sbList');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:#7f8c8d;">Loading scores...</div>';

  cloudRequest('type=getScores', function(data, err) {
    if (err || !data) {
      list.innerHTML = '<div style="text-align:center;padding:20px;">' +
        '<div style="font-size:2rem;">⚠️</div>' +
        '<b style="color:var(--accent);">Leaderboard Unavailable</b><br>' +
        '<span style="color:#555;font-size:0.85rem;">(' + (err || 'No data') + ')</span><br><br>' +
        '<button onclick="renderScoreboard()" style="padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 Retry</button>' +
        '</div>';
      return;
    }
    displayScores(data, list);
  });
}

function displayScores(data, list) {
  var html = '';
  var scores = data.scores || data.data || [];
  if (!scores || scores.length === 0) { list.innerHTML = '<div style="text-align:center;padding:20px;color:#7f8c8d;">No scores yet.</div>'; return; }
  var seen = {};
  scores.forEach(function(s) {
    var key = (s.mobile || s.id || s.name || 'unknown').toString().trim();
    var name = s.name || s.id || s.mobile || 'Unknown';
    var pct = Number(s.pct) || 0;
    var grade = s.grade || (pct >= 80 ? 'PASS' : 'FAIL');
    if (!seen[key]) seen[key] = { name: name, pct: pct, grade: grade };
    else {
      if (pct > seen[key].pct) { seen[key].pct = pct; seen[key].name = name; seen[key].grade = grade; }
    }
  });
  var sorted = Object.values(seen).sort(function(a,b){ return b.pct - a.pct; });
  var rank = 0;
  sorted.forEach(function(s) {
    rank++;
    var medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '#' + rank;
    var pctColor = s.pct >= 80 ? 'var(--green)' : 'var(--accent)';
    var gradeTag = s.grade === 'PASS'
      ? '<span style="background:#27ae60;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:bold;">PASS</span>'
      : '<span style="background:#e74c3c;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:bold;">FAIL</span>';
    html += '<div class="sb-row" style="align-items:center;padding:14px 12px;">' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:1.3rem;min-width:28px;text-align:center;">' + medal + '</span>' +
        '<div><b style="font-size:0.95rem;">' + s.name + '</b></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        gradeTag +
        '<span style="font-size:1.2rem;font-weight:bold;color:' + pctColor + ';min-width:45px;text-align:right;">' + s.pct + '%</span>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = html;
