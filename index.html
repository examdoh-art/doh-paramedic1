<title>DOH-Paramedic: CBT</title>
<style>
:root{
  --primary:#2c3e50;--accent:#e74c3c;--green:#27ae60;
  --yellow:#f39c12;--light:#ecf0f1;--card:#fff;
  --border:#bdc3c7;--text:#2c3e50;--sub:#7f8c8d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text);}
header{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:22px 20px 16px;text-align:center;border-bottom:4px solid var(--accent);}
header h1{font-size:1.4rem; margin-bottom:5px;}
main{max-width:820px;margin:0 auto;padding:10px 10px 80px;}
.score-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:18px;display:flex;justify-content:space-around;border:1px solid var(--border);box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.sc-item{text-align:center;}
.sc-item .val{font-size:1.4rem;font-weight:bold;display:block;}
.sc-item .lbl{font-size:0.65rem;color:var(--sub);text-transform:uppercase;}
.q-card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.05);}
.q-head{background:#fdfefe;padding:15px;border-bottom:1px solid #eee;display:flex;gap:12px;}
.q-num{background:var(--primary);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:bold;}
.q-num.ok{background:var(--green);}
.q-num.bad{background:var(--accent);}
.q-scen{font-size:0.95rem; line-height:1.6;}
.q-ask{font-size:0.95rem; font-weight:bold; padding:15px 15px 5px; color:var(--primary);}
.opts{padding:10px 15px 15px;display:flex;flex-direction:column;gap:8px;}
.opt{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;gap:10px;align-items:center;transition:0.2s;}
.opt.right{background:#e9f7ef;border-color:var(--green);}
.opt.wrong{background:#fdedec;border-color:var(--accent);}
.opt.done{pointer-events:none;}
#regOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#2c3e50;z-index:9999;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;}
.reg-box{background:#fff;border-radius:20px;padding:30px;max-width:420px;width:100%;text-align:center;}
.reg-field input{width:100%;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:1.2rem;text-align:center;margin-bottom:15px; outline:none;}
.btn-reg{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;}
.results{display:none;text-align:center;padding:40px;background:#fff;border-radius:20px;margin-top:20px; border:2px solid var(--primary);}
.results.show{display:block;}
.grade{font-size:3.5rem;font-weight:bold;margin:15px 0;}
.gA{color:var(--green);} .gF{color:var(--accent);}
.fab{position:fixed;bottom:25px;width:56px;height:56px;color:#fff;border:none;border-radius:50%;font-size:1.4rem;cursor:pointer;z-index:8000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
#sbFab{right:20px;background:#f39c12;}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9000;align-items:center;justify-content:center;padding:16px;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto;padding:20px;position:relative;}
.sb-row{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #eee; font-size: 0.9rem;}
.expbox{display:none;padding:15px;background:#f0f7ff;border-top:2px solid #3498db;margin:0;}
.expbox.show{display:block;}
.exp-top{font-weight:bold;color:#2c3e50;margin-bottom:8px;font-size:0.9rem;}
.exp-body{font-size:0.88rem;line-height:1.7;color:#333;}
</style>
</head>

<header>

<div id="setOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#2c3e50;z-index:9998;display:none;-webkit-flex-direction:column;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:20px;padding:30px;max-width:420px;width:100%;text-align:center;">
    <div style="font-size:3rem;">📚</div>

    <button onclick="selectSet(1)" style="width:100%;padding:18px;margin-bottom:12px;background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:800;cursor:pointer;">
      🏥 DOH Repeat<br><span style="font-size:0.75rem;font-weight:normal;opacity:0.8;">100 Questions • Pass: 80%</span>

    <button onclick="selectSet(2)" style="width:100%;padding:18px;background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:800;cursor:pointer;">
      📘 Nancy Caroline<br><span style="font-size:0.75rem;font-weight:normal;opacity:0.8;">325 Questions • Pass: 80%</span>
    </button>

</main>

  </div>
</div>

if (!Object.values) { Object.values = function(obj) { return Object.keys(obj).map(function(k) { return obj[k]; }); }; }
if (!Array.prototype.includes) { Array.prototype.includes = function(v) { return this.indexOf(v) !== -1; }; }

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqmDb2DLreNdLHCOC5Yk7JBdjurUjB8qOQfzrYMPks664uLrKMgZKVBiy2nPzWo1s-/exec';
var authorizedIDs = ["200432", "200401", "200394", "200393", "200662", "200671", "200522", "201059", "200510", "200667", "200605", "200659", "200666", "200983", "200958", "200649", "200655", "200686", "200610", "201070", "200600", "200520", "200967", "200861", "200897", "200882", "200839", "200848", "200795", "200982", "200737", "200753", "200738", "201086", "201076", "200736", "201081", "200631", "200624", "201050", "200521", "200508", "200606", "200616", "200618", "200785", "200991", "200791", "200996", "200821", "200955", "200813", "200994", "200961", "200969", "201415", "200790", "201101", "200823", "200780", "200812", "200455", "200464", "200468", "200479", "200495", "200398", "201034", "201037", "200630", "200504"];

var QS = [
  {"id": 1, "scen": "", "ask": "A 28-year-old male is brought to the emergency department by EMS in active generalized tonic-clonic status epilepticus. He has been seizing for approximately 25 minutes. Paramedics have administered three sequential doses of IV midazolam—without termination of seizure activity. His airway is being managed with BVM, SpO₂ is 94%, BP 162/94, HR 132, BGL 6.2 mmol/L. Which of the following is the MOST appropriate next-line medication to administer?", "opts": ["Phenytoin", "Valproic acid", "Ketamine", "Levetiracetam"], "ans": "D", "ansText": "D. Levetiracetam", "exp": "In refractory status epilepticus where benzodiazepines (midazolam) have failed after 3 doses, the next step is a second-line antiepileptic. Levetiracetam is preferred due to its rapid IV loading, minimal sedation, no cardiac toxicity, and no drug interactions — making it safer than phenytoin or valproic acid in the acute setting.", "key": "Medical Emergency Knowledge"},
  {"id": 2, "scen": "", "ask": "A 45-year-old male is pulled from an icy lake in VF cardiac arrest. Core temperature via esophageal probe is 27°C. After delivering one shock at maximum energy, the patient remains in VF. What is the MOST appropriate next action?", "opts": ["Continue defibrillating every 2 minutes per standard ACLS", "Administer epinephrine 1 mg IV and shock again", "Continue CPR and aggressive rewarming; defer further shocks until core temp ≥30°C", "Terminate resuscitation efforts"], "ans": "C", "ansText": "C. Continue CPR and aggressive rewarming; defer further shocks until core temp ≥30°C", "exp": "In severe hypothermia (<30°C), the myocardium is relatively unresponsive to defibrillation and medications. AHA/ERC guidelines recommend limiting to one shock attempt below 30°C, continuing high-quality CPR, and focusing on aggressive rewarming (warm IV fluids, warm humidified O₂, peritoneal/thoracic lavage). Further shocks and medications are deferred until core temp reaches ≥30°C.", "key": "Medical Emergency Knowledge"},
  {"id": 3, "scen": "", "ask": "A 78-year-old female presents with shortness of breath and an irregularly irregular pulse. Her 12-lead ECG shows a fibrillating baseline with no discernible P waves and irregular QRS complexes. On auscultation, which abnormal heart sound would you MOST LIKELY hear?", "opts": ["S4 (atrial gallop)", "S3 (ventricular gallop)", "Aortic ejection click", "Mid-systolic click"], "ans": "B", "ansText": "B. S3 (ventricular gallop)", "exp": "In atrial fibrillation, the atria do not contract effectively, so there is no atrial kick — meaning an S4 (which requires atrial contraction) cannot occur. The irregular ventricular filling and volume overload associated with AF often leads to an S3 gallop, caused by rapid passive filling of a non-compliant ventricle in early diastole.", "key": "Medical Emergency Knowledge"},
  {"id": 4, "scen": "", "ask": "A 32-year-old hiker is bitten by a rattlesnake on the lateral aspect of the right calf. There are two visible puncture wounds (fang marks) with localized swelling and ecchymosis. The patient is anxious but hemodynamically stable. What is the MOST APPROPRIATE prehospital management?", "opts": ["Apply a tourniquet proximal to the bite and elevate the leg", "Make an incision over the bite and apply suction", "Immobilize the affected limb with a splint", "Apply ice packs and a tight pressure bandage"], "ans": "C", "ansText": "C. Immobilize the affected limb with a splint", "exp": "For pit viper (rattlesnake) bites, the key prehospital management is immobilization of the affected limb at or below heart level with a splint. Tourniquets, incision/suction, and ice packs are all contraindicated as they can worsen tissue damage, increase necrosis, and do not slow venom absorption effectively.", "key": "Medical Emergency Knowledge"},
  {"id": 5, "scen": "", "ask": "Which of the following BEST describes the term \"drug affinity\"?", "opts": ["The amount of drug required to produce a desired clinical effect", "The strength or tightness with which a drug binds to its receptor", "The ability of a drug to produce a maximal physiological response after binding", "The duration that a drug remains active in the bloodstream"], "ans": "B", "ansText": "B. The strength or tightness with which a drug binds to its receptor", "exp": "Drug affinity refers to the strength of the chemical attraction between a drug and its receptor — how tightly the drug binds. It is distinct from efficacy (ability to produce a response after binding) and potency (amount of drug needed for an effect). High affinity means the drug binds strongly even at low concentrations.", "key": "Medical Emergency Knowledge"},
  {"id": 6, "scen": "", "ask": "A 28-year-old G2P1 at term is delivering a breech presentation in the back of your ambulance. The body, arms, and shoulders have been delivered, but the head remains in the birth canal for 60 seconds. The umbilical cord is no longer pulsating. What is the MOST APPROPRIATE next action?", "opts": ["Perform McRoberts maneuver", "Apply suprapubic pressure", "Mauriceau-Smellie-Veit maneuver", "Wait for spontaneous delivery"], "ans": "C", "ansText": "C. Mauriceau-Smellie-Veit maneuver", "exp": "The Mauriceau-Smellie-Veit (MSV) maneuver is specifically designed for an aftercoming (trapped) head in breech delivery. The provider places a hand over the baby's face to flex the head, while the other hand provides traction on the shoulders. McRoberts maneuver and suprapubic pressure are for shoulder dystocia in cephalic presentation, not breech.", "key": "Medical Emergency Knowledge"},
  {"id": 7, "scen": "", "ask": "A 38-year-old male with a history of IV heroin use presents to the ED with 2 weeks of fever, fatigue, and weight loss. On exam: temp 38.9°C, new tricuspid regurgitation murmur, painless red macules on both palms, splinter hemorrhages under several fingernails, and conjunctival petechiae. What is the MOST LIKELY diagnosis?", "opts": ["Rheumatic fever", "Infective endocarditis", "Vasculitis", "Disseminated gonococcal infection"], "ans": "B", "ansText": "B. Infective endocarditis", "exp": "IV drug use is the #1 risk factor for right-sided (tricuspid valve) endocarditis. The classic triad is: fever + new murmur + embolic phenomena. Janeway lesions (painless palmar macules), Osler nodes, splinter hemorrhages, and conjunctival petechiae are characteristic peripheral signs. Rheumatic fever affects mitral/aortic valves and presents differently.", "key": "Medical Emergency Knowledge"},
  {"id": 8, "scen": "", "ask": "A 35-year-old male is brought to the ED following a motor vehicle collision with an open femur fracture. After receiving multiple medications including morphine, ondansetron, ceftriaxone, and tetanus toxoid, he develops new-onset severe epigastric/right upper quadrant abdominal pain and tachycardia. Which medication is the MOST LIKELY cause?", "opts": ["Ondansetron", "Morphine", "Ceftriaxone", "Tetanus toxoid"], "ans": "B", "ansText": "B. Morphine", "exp": "Morphine causes sphincter of Oddi spasm, leading to increased biliary pressure and acute epigastric/RUQ pain mimicking biliary colic. This is a well-known side effect. Ondansetron, ceftriaxone, and tetanus toxoid do not cause this type of abdominal pain acutely.", "key": "Medical Emergency Knowledge"},
  {"id": 9, "scen": "", "ask": "A 55-year-old female presents with sudden-onset dyspnea, pleuritic chest pain, and tachypnea three days after a long-haul flight. Her oxygen saturation is 91% on room air. Which is the MOST COMMON ECG finding in patients with pulmonary embolism?", "opts": ["S1Q3T3 pattern", "Sinus tachycardia", "Right bundle branch block", "Atrial fibrillation"], "ans": "B", "ansText": "B. Sinus tachycardia", "exp": "While S1Q3T3 is the classic textbook finding for PE, sinus tachycardia is by far the MOST COMMON ECG finding, occurring in 40-50% of PE cases. S1Q3T3 occurs in only 10-20%. Other findings include RBBB, right axis deviation, and T-wave inversions in anterior leads.", "key": "Medical Emergency Knowledge"},
  {"id": 10, "scen": "", "ask": "A 9-month-old infant is brought to your attention after choking on a piece of grape. The infant is conscious but unable to cry or cough effectively, and is showing signs of cyanosis. The mother has already attempted back blows without success. What is the MOST APPROPRIATE next action?", "opts": ["Perform abdominal thrusts", "Begin chest compressions immediately", "Continue with 5 chest thrusts", "Perform a blind finger sweep"], "ans": "C", "ansText": "C. Continue with 5 chest thrusts", "exp": "For a conscious infant (<1 year) with severe choking (ineffective cough), the sequence is 5 back blows followed by 5 chest thrusts. Since back blows have already been attempted without success, the next step is 5 chest thrusts. Abdominal thrusts (Heimlich) are NOT used in infants due to risk of liver/spleen injury. Blind finger sweeps are contraindicated.", "key": "Medical Emergency Knowledge"},
  {"id": 11, "scen": "", "ask": "A 4-year-old child is choking on a hot dog at a birthday party. He is conscious, cyanotic, and unable to speak. What is the MOST APPROPRIATE intervention?", "opts": ["5 back blows + 5 chest thrusts", "Heimlich maneuver", "Blind finger sweep", "Mouth-to-mouth ventilation"], "ans": "B", "ansText": "B. Heimlich maneuver", "exp": "For children over 1 year with complete airway obstruction (conscious, unable to speak/cough), abdominal thrusts (Heimlich maneuver) are recommended. The back blows + chest thrusts combination is for infants <1 year. At age 4, the child is treated with the same protocol as older children and adults.", "key": "Medical Emergency Knowledge"},
  {"id": 12, "scen": "", "ask": "A 25-year-old male twisted his ankle. He has mild lateral ankle pain, no bony tenderness over either malleolus or midfoot, and can fully bear weight (4+ steps) at the scene and in the ED. Per Ottawa Rules, the MOST APPROPRIATE management is:", "opts": ["X-ray of the ankle", "X-ray of the foot", "No imaging", "Immediate orthopedic consultation"], "ans": "C", "ansText": "C. No imaging", "exp": "The Ottawa Ankle Rules state that X-ray is only needed if there is: (1) bony tenderness at the posterior edge/tip of either malleolus, (2) bony tenderness at the navicular or base of 5th metatarsal, OR (3) inability to weight-bear 4 steps immediately and in the ED. This patient has none of these criteria, so no imaging is needed.", "key": "Medical Emergency Knowledge"},
  {"id": 13, "scen": "", "ask": "A 45-year-old woman twisted her ankle on a wet floor. She has ankle pain and is UNABLE to take more than 2 steps both at the scene and in the ED. Bony palpation is non-tender. Per Ottawa Rules:", "opts": ["X-ray of the ankle is indicated", "No X-ray indicated since palpation is non-tender", "CT scan required", "MRI required"], "ans": "A", "ansText": "A. X-ray of the ankle is indicated", "exp": "The Ottawa Ankle Rules indicate X-ray if the patient is UNABLE to bear weight for 4 steps, regardless of bony tenderness. This patient cannot take more than 2 steps, meeting the weight-bearing criterion for imaging. The inability to walk is an independent indication for X-ray.", "key": "Medical Emergency Knowledge"},
  {"id": 14, "scen": "", "ask": "A 28-year-old male injured his foot stepping off a curb. He has midfoot pain and bony tenderness over the base of the 5th metatarsal. He can take 2 steps but with significant pain. Per Ottawa Foot Rules, what imaging is indicated?", "opts": ["No imaging required", "X-ray of the ankle only", "X-ray of the foot", "MRI of the foot"], "ans": "C", "ansText": "C. X-ray of the foot", "exp": "The Ottawa Foot Rules require foot X-ray if there is: (1) tenderness at the base of the 5th metatarsal, (2) tenderness at the navicular bone, OR (3) inability to weight-bear 4 steps. This patient has bony tenderness at the base of the 5th metatarsal, clearly meeting the criteria for foot X-ray.", "key": "Medical Emergency Knowledge"},
  {"id": 15, "scen": "", "ask": "A 35-year-old male is struck in the FRONTAL region of his head with a baseball bat. CT scan reveals a brain contusion. In addition to the frontal lobe injury at the impact site, where is the contrecoup injury MOST LIKELY located?", "opts": ["Right temporal lobe", "Left temporal lobe", "Occipital lobe", "Cerebellum"], "ans": "C", "ansText": "C. Occipital lobe", "exp": "Contrecoup injuries occur on the side opposite to the point of impact. When the frontal region is struck, the brain decelerates and impacts the inner skull on the opposite side — the occipital lobe. This is due to the brain bouncing within the cranial vault, causing injury directly opposite the impact site.", "key": "Medical Emergency Knowledge"},
  {"id": 16, "scen": "", "ask": "A construction worker in Dubai feels dizzy, nauseated, heavy sweating, temp 38.8°C, mentation intact. Diagnosis?", "opts": ["Heat stroke", "Heat exhaustion", "Heat cramps", "Heat syncope"], "ans": "B", "ansText": "B. Heat exhaustion", "exp": "Heat exhaustion presents with profuse sweating, dizziness, nausea, and temperature typically <40°C with intact mentation. Heat stroke is distinguished by altered mental status and temperature >40°C with cessation of sweating. Heat cramps involve isolated muscle cramps without systemic symptoms. Heat syncope is transient loss of consciousness.", "key": "Medical Emergency Knowledge"},
  {"id": 17, "scen": "", "ask": "A hiker is brought in after falling into a cold stream. He is shivering, alert, T 34°C, clothes soaked. First step?", "opts": ["IV warmed saline", "Remove wet clothing", "Active external rewarming with heating pads", "Hot shower immediately"], "ans": "B", "ansText": "B. Remove wet clothing", "exp": "The first priority in hypothermia management is removing wet clothing to stop ongoing evaporative heat loss. Wet clothing conducts heat away from the body 25x faster than dry clothing. Only after removing wet clothing should you proceed with active rewarming methods like warmed IV fluids, heating pads, or warm blankets.", "key": "Medical Emergency Knowledge"},
  {"id": 18, "scen": "", "ask": "A 24-year-old asthmatic in the ED shows a capnography tracing with a sloping, shark-fin–shaped expiratory upstroke. This indicates:", "opts": ["Hyperventilation", "Bronchospasm", "Esophageal intubation", "Cardiac arrest"], "ans": "B", "ansText": "B. Bronchospasm", "exp": "The shark-fin or curved expiratory upstroke on capnography indicates incomplete alveolar emptying due to airway obstruction — classic for bronchospasm/asthma. A normal capnogram has a rectangular shape with a flat plateau. Esophageal intubation shows no or minimal CO₂. Hyperventilation shows low EtCO₂ with normal waveform shape.", "key": "Medical Emergency Knowledge"},
  {"id": 19, "scen": "", "ask": "A post-op patient receives 3 doses of IV morphine with no pain relief or sedation. Next best step?", "opts": ["Give IV ketamine", "Check the IV line", "Switch to fentanyl", "Assume opioid tolerance and double the dose"], "ans": "B", "ansText": "B. Check the IV line", "exp": "When a patient shows zero response to multiple doses of IV morphine (no pain relief AND no sedation), the most likely cause is a non-functioning IV line (infiltrated, kinked, disconnected). Before assuming drug failure or tolerance, always verify that the medication is actually reaching the bloodstream by checking the IV site, line patency, and connections.", "key": "Medical Emergency Knowledge"},
  {"id": 20, "scen": "", "ask": "A patient on sertraline presents with agitation, tremor, hyperreflexia, clonus, diaphoresis, and fever after starting tramadol. Diagnosis?", "opts": ["Neuroleptic malignant syndrome", "Malignant hyperthermia", "Serotonin syndrome", "Anticholinergic crisis"], "ans": "C", "ansText": "C. Serotonin syndrome", "exp": "Serotonin syndrome occurs when two serotonergic drugs are combined — here sertraline (SSRI) + tramadol (weak opioid with serotonergic properties). Classic triad: altered mental status, autonomic instability (diaphoresis, tachycardia, fever), and neuromuscular hyperactivity (clonus, tremor, hyperreflexia). NMS presents with rigidity and bradykinesia, not clonus.", "key": "Medical Emergency Knowledge"},
  {"id": 21, "scen": "", "ask": "Which of the following is a classic sign/symptom of Congestive Heart Failure?", "opts": ["Bradycardia and hypertension", "Orthopnea", "Hemoptysis with night sweats", "Dry cough with weight loss"], "ans": "B", "ansText": "B. Orthopnea", "exp": "Orthopnea (dyspnea when lying flat, relieved by sitting up) is a hallmark symptom of CHF. When supine, venous return increases, overwhelming the failing heart and causing pulmonary congestion. Other classic CHF symptoms include paroxysmal nocturnal dyspnea (PND), peripheral edema, jugular venous distension, and S3 gallop.", "key": "Medical Emergency Knowledge"},
  {"id": 22, "scen": "", "ask": "A trauma patient has dullness to percussion, absent breath sounds and tracheal deviation on the affected side. Diagnosis?", "opts": ["Tension pneumothorax", "Massive hemothorax", "Cardiac tamponade", "Flail chest"], "ans": "B", "ansText": "B. Massive hemothorax", "exp": "Massive hemothorax presents with: dullness to percussion (blood is dense), absent breath sounds (compressed lung), and tracheal deviation TOWARD the affected side (due to volume loss/atelectasis). Tension pneumothorax has hyperresonance (air) and tracheal deviation AWAY from the affected side. This distinction is critical for correct diagnosis.", "key": "Medical Emergency Knowledge"},
  {"id": 23, "scen": "", "ask": "A trauma patient with an open ankle fracture and BP 85/50 mmHg needs urgent analgesia. Best choice?", "opts": ["Morphine", "Fentanyl", "Ketamine", "Midazolam"], "ans": "C", "ansText": "C. Ketamine", "exp": "Ketamine is the analgesic of choice for hypotensive trauma patients because it maintains blood pressure through sympathetic stimulation, unlike morphine and fentanyl which can worsen hypotension through vasodilation and histamine release. Ketamine also provides dissociative analgesia and has bronchodilatory properties.", "key": "Medical Emergency Knowledge"},
  {"id": 24, "scen": "", "ask": "A head trauma patient develops hypertension, bradycardia, and irregular respirations. This Cushing's triad indicates:", "opts": ["Spinal shock", "Impending brain herniation", "Hypovolemic shock", "Neurogenic shock"], "ans": "B", "ansText": "B. Impending brain herniation", "exp": "Cushing's triad (hypertension + bradycardia + irregular respirations) is a late and ominous sign of critically raised intracranial pressure (ICP) leading to brainstem herniation. The hypertension is a reflex response to maintain cerebral perfusion, while bradycardia results from vagal stimulation as the brainstem is compressed.", "key": "Medical Emergency Knowledge"},
  {"id": 25, "scen": "", "ask": "A 28-year-old male is brought to the Emergency Department following a motor vehicle collision. On assessment: He opens his eyes only to painful stimuli. He makes incomprehensible sounds when spoken to. When painful stimuli are applied, he demonstrates extension of the arms (decerebrate posturing). What is this patient's Glasgow Coma Scale (GCS) score?", "opts": ["5", "6", "7", "8"], "ans": "B", "ansText": "B. 6", "exp": "GCS scoring: Eye opening to pain = 2 (not spontaneous=4, to voice=3, none=1). Incomprehensible sounds = 2 (not oriented=5, confused=4, inappropriate words=3, none=1). Decerebrate extension = 2 (not obeys=6, localizes=5, withdrawal=4, flexion=3, none=1). Total: 2 + 2 + 2 = 6.", "key": "Medical Emergency Knowledge"},
  {"id": 26, "scen": "A 62-year-old male, known diabetic and hypertensive, presents to the Emergency Department with severe crushing retrosternal chest pain radiating to the jaw and left arm for the past 1 hour. The pain is associated with profuse sweating, nausea, and one episode of vomiting.\nOn examination: BP 95/60 mmHg | HR 52 bpm, regular | RR 20/min, SpO₂ 96% on room air | Chest: clear, no crackles | JVP: not raised | Cool peripheries, capillary refill 3 sec\n12-Lead ECG findings: ST-segment elevation in leads II, III, and aVF", "ask": "What is the type of MI?", "opts": ["Anterior STEMI", "Inferior STEMI", "Lateral STEMI", "Posterior STEMI"], "ans": "B", "ansText": "B. Inferior STEMI", "exp": "ST elevation in leads II, III, and aVF indicates an inferior STEMI. These leads look at the inferior surface of the heart, supplied by the right coronary artery (RCA) in 85% of people. The inferior wall includes the diaphragmatic surface of the left ventricle.", "key": "Medical Emergency Knowledge"},
  {"id": 27, "scen": "A 62-year-old male, known diabetic and hypertensive, presents to the Emergency Department with severe crushing retrosternal chest pain radiating to the jaw and left arm for the past 1 hour. The pain is associated with profuse sweating, nausea, and one episode of vomiting.\nOn examination: BP 95/60 mmHg | HR 52 bpm, regular | RR 20/min, SpO₂ 96% on room air | Chest: clear, no crackles | JVP: not raised | Cool peripheries, capillary refill 3 sec\n12-Lead ECG findings: ST-segment elevation in leads II, III, and aVF", "ask": "Where are the reciprocal ECG changes seen?", "opts": ["V1–V2", "V5–V6", "Leads I and aVL", "II, III, aVF"], "ans": "C", "ansText": "C. Leads I and aVL", "exp": "Reciprocal changes (ST depression) in inferior STEMI are seen in leads I and aVL (lateral leads). These reciprocal changes occur because the electrical vector of injury points toward the inferior leads and away from the lateral leads, creating a mirror-image depression.", "key": "Medical Emergency Knowledge"},
  {"id": 28, "scen": "A 62-year-old male, known diabetic and hypertensive, presents to the Emergency Department with severe crushing retrosternal chest pain radiating to the jaw and left arm for the past 1 hour. The pain is associated with profuse sweating, nausea, and one episode of vomiting.\nOn examination: BP 95/60 mmHg | HR 52 bpm, regular | RR 20/min, SpO₂ 96% on room air | Chest: clear, no crackles | JVP: not raised | Cool peripheries, capillary refill 3 sec\n12-Lead ECG findings: ST-segment elevation in leads II, III, and aVF", "ask": "What is the change in the QRS complex?", "opts": ["Wide QRS (>120 ms)", "Narrow QRS (<120 ms)", "Delta wave with short PR", "Sine wave pattern"], "ans": "B", "ansText": "B. Narrow QRS (<120 ms)", "exp": "In acute STEMI without bundle branch block or pre-excitation, the QRS complex remains narrow (<120 ms). A wide QRS would suggest a conduction abnormality (BBB), electrolyte imbalance, or ventricular rhythm — none of which are described in this case. The ST elevation occurs without affecting the QRS duration.", "key": "Medical Emergency Knowledge"},
  {"id": 29, "scen": "", "ask": "A 45-year-old man presents to the Emergency Department with sudden severe sharp lower back pain after lifting a heavy box. Over the next few hours, he develops numbness in both legs, difficulty walking, and reports a sensation of numbness around his buttocks and groin area. He also states that he is having difficulty controlling his bladder. What is the MOST likely diagnosis?", "opts": ["Spinal injury", "Pericarditis", "Cauda equina syndrome", "Sciatica"], "ans": "C", "ansText": "C. Cauda equina syndrome", "exp": "Cauda equina syndrome is a surgical emergency characterized by: bilateral leg weakness/numbness, saddle anesthesia (numbness around buttocks/perineum/groin), and bladder/bowel dysfunction. It results from compression of the cauda equina nerve roots, often by a large disc herniation. Unlike simple sciatica, it is bilateral and involves sphincter disturbance.", "key": "Medical Emergency Knowledge"},
  {"id": 30, "scen": "A 14-year-old boy (weight 30 kg) is brought to the Emergency Department by his mother 1 hour after she found him drowsy in his bedroom next to an empty bottle of his father's antidepressant medication. He had ingested 30 tablets of amitriptyline, 10 mg each, following an argument at school.\nOn examination: GCS 11/15 | T 38.2°C | HR 135 bpm | BP 85/50 mmHg | RR 20/min, SpO₂ 96% RA | Pupils dilated, dry mouth, flushed dry skin, urinary retention | Brief generalized tonic-clonic seizure in ED\n12-Lead ECG: Sinus tachycardia (HR 135) | QRS duration = 145 ms (wide) | Prolonged QTc = 510 ms | Tall R wave (4 mm) in aVR | R/S ratio in aVR > 0.7", "ask": "What is the correct formula to calculate the ingested dose / toxicity?", "opts": ["Number of tablets ÷ Strength per tablet", "Total dose ÷ Body weight", "Body weight × Strength per tablet", "Number of tablets × Body weight"], "ans": "B", "ansText": "B. Total dose ÷ Body weight", "exp": "Ingested dose per kg = Total dose ÷ Body weight. Total dose = 30 tablets × 10 mg = 300 mg. Dose per kg = 300 mg ÷ 30 kg = 10 mg/kg. This is a significant overdose as TCA toxicity begins at 10 mg/kg and is potentially lethal above 15-20 mg/kg.", "key": "Medical Emergency Knowledge"},
  {"id": 31, "scen": "A 14-year-old boy (weight 30 kg) is brought to the Emergency Department by his mother 1 hour after she found him drowsy in his bedroom next to an empty bottle of his father's antidepressant medication. He had ingested 30 tablets of amitriptyline, 10 mg each, following an argument at school.\nOn examination: GCS 11/15 | T 38.2°C | HR 135 bpm | BP 85/50 mmHg | RR 20/min, SpO₂ 96% RA | Pupils dilated, dry mouth, flushed dry skin, urinary retention | Brief generalized tonic-clonic seizure in ED\n12-Lead ECG: Sinus tachycardia (HR 135) | QRS duration = 145 ms (wide) | Prolonged QTc = 510 ms | Tall R wave (4 mm) in aVR | R/S ratio in aVR > 0.7", "ask": "What are the major COMPLICATIONS of TCA toxicity?", "opts": ["Hyperkalemia, renal failure, hemolysis", "Cardiotoxicity, CNS toxicity, Anticholinergic toxidrome", "Hepatotoxicity and coagulopathy", "Pulmonary fibrosis and ARDS"], "ans": "B", "ansText": "B. Cardiotoxicity, CNS toxicity, Anticholinergic toxidrome", "exp": "TCA toxicity produces three major complications: (1) Cardiotoxicity — sodium channel blockade causing wide QRS, arrhythmias, and hypotension; (2) CNS toxicity — seizures, altered consciousness, coma; (3) Anticholinergic toxidrome — dilated pupils, dry mouth, urinary retention, tachycardia, flushed skin, and hyperthermia.", "key": "Medical Emergency Knowledge"},
  {"id": 32, "scen": "A 14-year-old boy (weight 30 kg) is brought to the Emergency Department by his mother 1 hour after she found him drowsy in his bedroom next to an empty bottle of his father's antidepressant medication. He had ingested 30 tablets of amitriptyline, 10 mg each, following an argument at school.\nOn examination: GCS 11/15 | T 38.2°C | HR 135 bpm | BP 85/50 mmHg | RR 20/min, SpO₂ 96% RA | Pupils dilated, dry mouth, flushed dry skin, urinary retention | Brief generalized tonic-clonic seizure in ED\n12-Lead ECG: Sinus tachycardia (HR 135) | QRS duration = 145 ms (wide) | Prolonged QTc = 510 ms | Tall R wave (4 mm) in aVR | R/S ratio in aVR > 0.7", "ask": "How will you TREAT the complications of TCA toxicity?", "opts": ["Activated charcoal + flumazenil + phenytoin + airway support", "Sodium bicarbonate + IV fluids + benzodiazepines + airway support", "Amiodarone + procainamide + hemodialysis + airway support", "Naloxone + N-acetylcysteine + atropine + airway support"], "ans": "B", "ansText": "B. Sodium bicarbonate + IV fluids + benzodiazepines + airway support", "exp": "Treatment of TCA toxicity: Sodium bicarbonate is the primary antidote (narrows QRS, treats acidosis, increases protein binding). IV fluids for hypotension. Benzodiazepines for seizures (NOT phenytoin — it worsens cardiac conduction). Airway management/intubation for GCS <8. Flumazenil is CONTRAINDICATED (lowers seizure threshold).", "key": "Medical Emergency Knowledge"},
  {"id": 33, "scen": "", "ask": "A 6-year-old boy is rescued from a swimming pool after 2 minutes submersion. He is unresponsive and not breathing. What is the first action?", "opts": ["Start chest compressions immediately (30:2)", "Open airway and give 5 rescue breaths", "Perform Heimlich maneuver to remove water", "Place in recovery position"], "ans": "B", "ansText": "B. Open airway and give 5 rescue breaths", "exp": "In pediatric drowning/submersion, the primary cause of cardiac arrest is hypoxia, not a cardiac arrhythmia. Therefore, rescue breaths are the priority — give 5 initial rescue breaths before starting chest compressions. This differs from adult cardiac arrest where compressions come first (C-A-B). The sequence for drowning is A-B-C.", "key": "Medical Emergency Knowledge"},
  {"id": 34, "scen": "", "ask": "You are a paramedic working a 12-hour shift with your EMS partner of 3 years. Over the past 2 months—ever since you both responded to a fatal pediatric MVC—you have noticed a worrying change in his behavior: he has become irritable and withdrawn during shifts, reports frequent nightmares and poor sleep, deliberately avoids the route where the accident occurred, recently had a panic episode while responding to a similar call, has started drinking more heavily after shifts, appears emotionally numb and disengaged during family-related calls, and today—after a particularly difficult run—he suddenly snaps at you and says, \"I just can't do this anymore.\" What is the BEST way to deal with your partner showing signs of PTSD?", "opts": ["Ignore it — it's a personal matter", "Report him directly to management for removal from duty", "Approach with empathy, encourage professional help", "Tell him to \"toughen up\" — it's part of the job"], "ans": "C", "ansText": "C. Approach with empathy, encourage professional help", "exp": "When a colleague shows signs of PTSD (nightmares, avoidance, hyperarousal, emotional numbing, substance use), the most appropriate response is to approach with empathy and encourage professional help (CISM, EAP, mental health referral). Ignoring it risks harm to the partner and patients. Direct reporting without support damages trust. Telling someone to 'toughen up' worsens the condition.", "key": "Medical Emergency Knowledge"},
  {"id": 35, "scen": "", "ask": "A 45-year-old male is dining at a restaurant when he suddenly clutches his throat. On your arrival, he is conscious, standing, coughing forcefully, with visible cyanosis around the lips. He cannot speak in full sentences but is making strong coughing efforts. What is the BEST initial management for this patient?", "opts": ["Bag-Valve-Mask (BVM) ventilation", "Magill forceps removal", "5 back blows + 5 chest thrusts", "Encourage him to continue coughing"], "ans": "D", "ansText": "D. Encourage him to continue coughing", "exp": "A patient with a partial (mild) airway obstruction who is coughing forcefully should be encouraged to continue coughing — this is the most effective way to clear the obstruction. Interventions like back blows, chest thrusts, or Heimlich are only indicated when the cough becomes ineffective (silent cough, unable to speak, cyanosis worsening).", "key": "Medical Emergency Knowledge"},
  {"id": 36, "scen": "Patient A: Traumatic arm amputation with a tourniquet applied, bleeding controlled, conscious, BP 110/70\nPatient B: Cardiac arrest — pulseless, apneic, no shockable rhythm\nPatient C: Facial laceration, alert, walking, minor bleeding\nPatient D: Tachypneic (RR 36/min), SpO₂ 88%, accessory muscle use, confused", "ask": "You are the triage officer at a mass casualty incident. Four patients arrive simultaneously:", "opts": ["B → A → D → C", "D → A → C → B", "A → B → C → D", "C → D → A → B"], "ans": "B", "ansText": "B. D → A → C → B", "exp": "Using START triage: Patient D (respiratory distress, confused) = RED (immediate). Patient A (tourniquet applied, bleeding controlled, stable) = YELLOW (delayed). Patient C (walking, minor bleeding) = GREEN (minor). Patient B (cardiac arrest, no shockable rhythm) = BLACK (expectant/deceased in MCI). In MCI, resources are allocated to salvageable patients first.", "key": "Medical Emergency Knowledge"},
  {"id": 37, "scen": "", "ask": "A 28-year-old known asthmatic is brought to the ED after spending a prolonged period outdoors in cold weather. He presents with audible wheezing, dyspnea, and chest tightness. Paramedics started a salbutamol nebulizer en route, but on arrival the patient shows no significant improvement — wheezing persists, SpO₂ 91%, RR 28, HR 110. What is the most likely reason for the lack of response to the nebulizer?", "opts": ["Wrong drug given", "Cold air itself triggers bronchospasm", "Patient is non-compliant", "Salbutamol is contraindicated in asthma"], "ans": "B", "ansText": "B. Cold air itself triggers bronchospasm", "exp": "Cold air is a known trigger for bronchospasm in asthmatics. It causes airway cooling and drying, which triggers mast cell degranulation, parasympathetic activation, and direct smooth muscle contraction. The salbutamol nebulizer may show limited effect because the cold exposure continues to trigger ongoing bronchospasm — warming the patient and providing warm humidified oxygen is also important.", "key": "Medical Emergency Knowledge"},
  {"id": 38, "scen": "Drowsy, weak, lethargic | T 38.5°C | HR 130 bpm | BP 80/50 mmHg | RR 22/min\nDry mucous membranes, hyperpigmentation of skin\nLabs: Na⁺ 125 (low), K⁺ 6.0 (high), glucose 55 (low)", "ask": "A 35-year-old female with a known history of Addison's disease (on chronic hydrocortisone replacement) presents to the ED with sudden severe vomiting and profuse diarrhea for the past 6 hours. She missed her morning dose of medication.", "opts": ["Oral hydrocortisone 20 mg", "IV Hydrocortisone 100 mg", "IV insulin for hyperkalemia", "IV antibiotics"], "ans": "B", "ansText": "B. IV Hydrocortisone 100 mg", "exp": "This is an adrenal (Addisonian) crisis — acute adrenal insufficiency triggered by the physiological stress of illness (vomiting/diarrhea) combined with a missed hydrocortisone dose. The classic triad: hypotension, hyponatremia, hyperkalemia. Treatment is IV hydrocortisone 100 mg stat — this is life-saving and should not be delayed. Oral route is inappropriate when the patient is vomiting.", "key": "Medical Emergency Knowledge"},
  {"id": 39, "scen": "You are a paramedic called to a home where an 18-year-old female has just delivered a baby and is bleeding heavily. She appears frightened, withdrawn, and avoids eye contact. An older man (claiming to be her husband) answers all your questions on her behalf, refuses to var her speak, and stands very close to her, monitoring everything she does. When you try to address her directly, he interrupts.", "ask": "What is the MOST appropriate initial action?", "opts": ["Immediately contact the police about the old man", "Handover the patient to the hospital and leave without comment", "Confront the old man aggressively — \"Who are you?\"", "Politely but firmly separate the patient from the man"], "ans": "D", "ansText": "D. Politely but firmly separate the patient from the man", "exp": "When domestic violence/abuse is suspected (controlling partner, frightened patient, restricted communication), the priority is to safely separate the patient from the suspected abuser to allow private assessment and disclosure. This is done politely but firmly — for example, saying 'I need to examine the patient privately.' Direct confrontation or police contact without patient consent may escalate danger.", "key": "Medical Emergency Knowledge"},
  {"id": 40, "scen": "You are a paramedic called to a home where an 18-year-old female has just delivered a baby and is bleeding heavily. She appears frightened, withdrawn, and avoids eye contact. An older man (claiming to be her husband) answers all your questions on her behalf, refuses to var her speak, and stands very close to her, monitoring everything she does. When you try to address her directly, he interrupts.", "ask": "Why did the bleeding happen?", "opts": ["Placenta previa", "PPH", "Vertigo", "Normal lochia"], "ans": "B", "ansText": "B. PPH (Postpartum Haemorrhage)", "exp": "Postpartum hemorrhage (PPH) is defined as blood loss >500 mL after vaginal delivery. It is the most common cause of heavy bleeding immediately after childbirth. The most common cause is uterine atony (80%). Other causes follow the '4 Ts': Tone (atony), Trauma (tears), Tissue (retained placenta), and Thrombin (coagulopathy).", "key": "Medical Emergency Knowledge"},
  {"id": 41, "scen": "", "ask": "A 25-year-old male is brought to ED with 6 months of auditory hallucinations, paranoid delusions (neighbors spying), disorganized speech, social withdrawal, and aggression. Most likely diagnosis?", "opts": ["Bipolar disorder", "Major depressive disorder", "Schizophrenia", "Generalized anxiety disorder"], "ans": "C", "ansText": "C. Schizophrenia", "exp": "Schizophrenia is characterized by positive symptoms (hallucinations, delusions, disorganized speech) and negative symptoms (social withdrawal, flat affect) lasting >6 months. Auditory hallucinations and paranoid delusions are the most common positive symptoms. Bipolar disorder features mood episodes; depression lacks psychotic features typically; GAD involves excessive worry without psychosis.", "key": "Medical Emergency Knowledge"},
  {"id": 42, "scen": "", "ask": "A 28-year-old male is brought to ED after a motor vehicle accident. He has severe facial trauma, active oral bleeding, multiple loose/avulsed teeth, and a swollen tongue. He is conscious, GCS 14, breathing spontaneously. C-spine has been cleared. What is the BEST position for this patient?", "opts": ["Supine flat", "Trendelenburg (head down)", "Sitting up and leaning forward", "Prone"], "ans": "C", "ansText": "C. Sitting up and leaning forward", "exp": "A conscious patient with severe facial trauma, oral bleeding, and loose teeth should be positioned sitting up and leaning forward. This allows blood and secretions to drain anteriorly out of the mouth, preventing aspiration. Supine or Trendelenburg positions risk airway compromise from blood pooling in the posterior pharynx.", "key": "Medical Emergency Knowledge"},
  {"id": 43, "scen": "", "ask": "A 34-year-old woman is brought to the Emergency Department after an accident while cooking. She was carrying a large pot of boiling soup when she slipped, causing the hot liquid to spill over her body. On assessment, she has partial-thickness burns involving the entire anterior surface of both arms and the entire anterior torso. She is alert and complaining of severe pain. Her vital signs are stable. Using the Rule of Nines for an adult, what is the estimated total body surface area (TBSA) burned?", "opts": ["9%", "18%", "27%", "36%"], "ans": "C", "ansText": "C. 27%", "exp": "Rule of Nines (adult): Each arm anterior = 4.5% (both arms anterior = 9%). Anterior torso = 18%. Total = 9% + 18% = 27%. The Rule of Nines divides the body: head 9%, each arm 9%, anterior trunk 18%, posterior trunk 18%, each leg 18%, perineum 1%.", "key": "Medical Emergency Knowledge"},
  {"id": 44, "scen": "", "ask": "A 19-year-old male is brought to the ER 10 minutes after being stung by a bee at a park. He is alert and says \"I can't breathe.\" On examination: generalized urticaria all over the body, lip and tongue swelling, audible wheezing bilaterally, and BP = 78/50 mmHg, HR = 128 bpm, SpO₂ = 91%. He has no known drug allergies but was stung by bees before. What is the MOST appropriate FIRST-LINE treatment?", "opts": ["IV Diphenhydramine 50 mg", "Nebulized Salbutamol", "IM Epinephrine 0.5 mg", "IV Hydrocortisone 200 mg"], "ans": "C", "ansText": "C. IM Epinephrine 0.5 mg", "exp": "Anaphylaxis requires IMMEDIATE IM epinephrine (adrenaline) 0.5 mg (1:1000) into the anterolateral thigh. It is the FIRST-LINE drug — given before antihistamines, steroids, or bronchodilators. Epinephrine reverses vasodilation (raising BP), reduces bronchospasm, and decreases mucosal edema. Delay in epinephrine administration is the leading cause of death in anaphylaxis.", "key": "Medical Emergency Knowledge"},
  {"id": 45, "scen": "", "ask": "You are a paramedic dispatched to a residential address. On arrival you find a 5-year-old boy sitting quietly in the corner of the living room. His mother states he \"fell from a tree in the garden earlier today.\" She appears nervous and avoids eye contact. The child does not speak and flinches when you approach him. On assessment you find multiple bruises on his back, buttocks, and upper arms in mixed stages of healing — some yellowish (old) and some dark purple (recent) — with no bruises on his knees or shins. His mother first says the fall happened in the morning, then changes her story to the afternoon. Vital signs are stable (HR 105, RR 22, SpO₂ 99%, GCS 15). As the attending paramedic, what is the MOST appropriate interpretation of this presentation?", "opts": ["Accidental trauma consistent with falling from a tree", "Neglect only — the family delayed seeking medical care", "Child physical abuse", "Bleeding disorder such as ITP or haemophilia"], "ans": "C", "ansText": "C. Child physical abuse", "exp": "Multiple bruises in different stages of healing (old yellowish + new purple) on non-accidental locations (back, buttocks, upper arms — not knees/shins), inconsistent/changing history, fearful child behavior, and nervous caregiver are classic indicators of non-accidental injury (child abuse). Accidental falls produce bruises on bony prominences (knees, shins, forehead).", "key": "Medical Emergency Knowledge"},
  {"id": 46, "scen": "", "ask": "In the DRcABC primary survey framework, what does the small \"c\" stand for and why does it come BEFORE the Airway?", "opts": ["Cervical spine — must be immobilised before airway management", "Circulation — pulse must be checked before breathing", "Catastrophic haemorrhage — arterial bleeding can cause death within minutes and must be controlled immediately", "C-spine — jaw thrust must replace head-tilt before any assessment"], "ans": "C", "ansText": "C. Catastrophic haemorrhage", "exp": "In the DRcABC framework: D=Danger, R=Response, c=catastrophic hemorrhage, A=Airway, B=Breathing, C=Circulation. The small 'c' for catastrophic hemorrhage comes before Airway because massive external arterial bleeding (e.g., limb amputation, major vessel injury) can cause death within 2-3 minutes — faster than airway obstruction. Immediate tourniquet or direct pressure application is the priority.", "key": "Medical Emergency Knowledge"},
  {"id": 47, "scen": "", "ask": "A 45-year-old man presents with sudden right-sided facial weakness. He cannot raise his right eyebrow, cannot close his right eye, and has drooping of the right side of his mouth. What is the MOST likely diagnosis?", "opts": ["Left-sided stroke", "Right-sided stroke", "Bell's Palsy", "Multiple Sclerosis"], "ans": "C", "ansText": "C. Bell's Palsy", "exp": "Bell's palsy affects the entire ipsilateral face — both upper AND lower face (forehead, eye, mouth). A stroke (upper motor neuron lesion) spares the forehead because the upper face has bilateral cortical innervation. Since this patient cannot raise his eyebrow or close his eye, this is a lower motor neuron (LMN) lesion = Bell's palsy.", "key": "Medical Emergency Knowledge"},
  {"id": 48, "scen": "", "ask": "A paramedic is inserting an IV cannula into a patient's arm. The distance between the paramedic and the patient is approximately 30–40 cm. According to Edward Hall's proxemics theory, what zone of personal space does this represent?", "opts": ["Social zone", "Personal zone", "Intimate zone", "Professional zone"], "ans": "C", "ansText": "C. Intimate zone", "exp": "Edward Hall's proxemics defines four zones: Intimate (0-45 cm) — for close relationships and medical procedures; Personal (45-120 cm) — for friends and conversations; Social (120-360 cm) — for formal interactions; Public (>360 cm) — for lectures/presentations. IV cannulation at 30-40 cm falls within the intimate zone.", "key": "Medical Emergency Knowledge"},
  {"id": 49, "scen": "", "ask": "A 25-year-old woman is found wandering naked in her neighborhood. She reports that voices from the television instructed her to free the animals in the street. On examination, she appears disorganized and insists the voices are real. What is the most likely diagnosis?", "opts": ["Delirium", "Acute Psychosis", "Mania", "Personality Disorder"], "ans": "B", "ansText": "B. Acute Psychosis", "exp": "Acute psychosis is characterized by a sudden break from reality with hallucinations (auditory/visual), delusions, and disorganized behavior/speech. Command hallucinations from the TV are a classic presentation. Unlike delirium, there is no underlying medical cause identifiable. Unlike mania, there is no elevated mood or grandiosity as the primary feature.", "key": "Medical Emergency Knowledge"},
  {"id": 50, "scen": "", "ask": "A researcher wants to study the effect of yoga on stress reduction among university students. Which part of the PICO framework does \"university students with high stress levels\" represent?", "opts": ["Intervention", "Comparison", "Patient/Problem", "Outcome"], "ans": "C", "ansText": "C. Patient/Problem", "exp": "In the PICO framework: P = Patient/Population/Problem, I = Intervention, C = Comparison, O = Outcome. 'University students with high stress levels' describes the patient population and their problem — this is the P component. Yoga would be the Intervention, comparison might be no yoga, and outcome would be stress reduction.", "key": "Medical Emergency Knowledge"},
  {"id": 51, "scen": "", "ask": "You hand over a 65yo female with chest pain to ED: 'This is Fatima, 65, chest pain onset while cooking. She has central crushing pain, pale, diaphoretic. Vitals: BP 88/50, HR 110, SpO2 94%. We gave aspirin 300mg, GTN spray, IV access. She takes metformin for diabetes. Past MI 2019.' ED doctor later gives penicillin and she develops anaphylaxis. Which IMIST-AMBO component did you miss?", "opts": ["I – Identification", "S – Signs", "A – Allergies", "B – Background"], "ans": "C", "ansText": "C. A – Allergies", "exp": "IMIST-AMBO is a structured handover tool: I=Identification, M=Mechanism, I=Injuries/Illness, S=Signs/Vitals, T=Treatment given, A=Allergies, M=Medications, B=Background, O=Other. The handover covered I, M, I, S, T, M, and B — but omitted A (Allergies). This led to the patient receiving penicillin, causing anaphylaxis.", "key": "Medical Emergency Knowledge"},
  {"id": 52, "scen": "", "ask": "You treat a 19-year-old female after a minor RTC. She is crying, shaking, repeatedly saying \"I thought I was going to die.\" You complete a perfect primary survey, document everything, splint her wrist efficiently, and say: \"Vitals stable, you're fine, we'll be at hospital in 10 minutes,\" then turn away to clean the stretcher. Technically competent, but which pillar of professionalism is MISSING?", "opts": ["Accountability", "Integrity", "Excellence", "Compassion"], "ans": "D", "ansText": "D. Compassion", "exp": "The four pillars of medical professionalism are: Accountability, Integrity, Excellence, and Compassion. The paramedic demonstrated excellence (technically perfect), accountability (proper documentation), and integrity (honest assessment). However, dismissing an emotionally distressed patient without empathy or reassurance shows a lack of Compassion.", "key": "Medical Emergency Knowledge"},
  {"id": 53, "scen": "", "ask": "28-year-old male, stab wound to chest, now in TCA on scene. Your team: Applies pelvic binder and gives blood for Hypovolaemia, Intubates and ventilates with 100% O2 for Oxygenation, performs bilateral finger thoracostomies for Tension pneumothorax, you leave him exposed on wet ground, no blankets, IV fluids are cold, after 5 minutes, core temp is 33°C and coagulopathy worsens. Which HOTT-related principle is MISSING in this scenario?", "opts": ["Hypovolemia control", "Oxygenation", "Tension pneumothorax decompression", "Hypothermia prevention"], "ans": "D", "ansText": "D. Hypothermia prevention", "exp": "HOTT stands for: H=Hypovolemia, O=Oxygenation, T=Tension pneumothorax, T=Temperature (hypothermia prevention). The team addressed H (pelvic binder, blood), O (intubation, 100% O₂), and the first T (thoracostomies). But they failed to prevent hypothermia — leaving the patient exposed on wet ground with cold IV fluids caused core temp to drop to 33°C, worsening the lethal triad (hypothermia + acidosis + coagulopathy).", "key": "Medical Emergency Knowledge"},
  {"id": 54, "scen": "", "ask": "A 28-year-old woman presents with sudden onset shortness of breath and sharp chest pain that worsens with inspiration. She has no past medical history but has been taking a combined oral contraceptive pill for the past 6 months. Her vitals show HR 110/min, RR 24/min, and SpO₂ 91% on room air. Lung exam is clear. ECG shows sinus tachycardia. What is the most likely diagnosis?", "opts": ["Spontaneous pneumothorax", "Pulmonary embolism", "Acute pericarditis", "Panic attack"], "ans": "B", "ansText": "B. Pulmonary embolism", "exp": "This young woman has classic PE risk factors (OCP use), pleuritic chest pain, tachycardia, hypoxia, and clear lungs. Clear lungs with hypoxia strongly suggests PE — in pneumonia/asthma, lungs would be abnormal on exam. OCP increases PE risk 3-4x by inducing a hypercoagulable state. Sinus tachycardia is the most common ECG finding in PE.", "key": "Medical Emergency Knowledge"},
  {"id": 55, "scen": "", "ask": "A 29-year-old male develops calf pain after intense exercise in hot weather. He reports dehydration and long periods of sitting at work. Most likely diagnosis:", "opts": ["Muscle strain", "DVT", "Cellulitis", "Achilles tendinopathy"], "ans": "B", "ansText": "B. DVT", "exp": "This patient has multiple DVT risk factors: dehydration, prolonged immobility (sitting at work), and recent intense exercise (which can cause endothelial injury). Calf pain with swelling in this context should be considered DVT until proven otherwise. Muscle strain typically follows a specific injury mechanism and doesn't have these risk factors together.", "key": "Medical Emergency Knowledge"},
  {"id": 56, "scen": "", "ask": "A 78-year-old man is brought by his family because he has recently started passing urine on his clothes. During assessment, you ask him a simple orientation question. He gives an incorrect answer. When you repeat the same question a minute later, he gives the correct answer. What is the most likely explanation for this pattern?", "opts": ["Early Alzheimer's dementia", "Delirium with fluctuating attention", "Depression-related pseudodementia", "Normal age-related forgetfulness"], "ans": "B", "ansText": "B. Delirium with fluctuating attention", "exp": "Fluctuating attention and cognition are the hallmark of delirium — the patient gives wrong answers one moment and correct answers the next. Dementia shows a progressive, consistent decline without fluctuation. Delirium is acute, fluctuating, and usually has an identifiable cause (infection, medication, metabolic disturbance). The urinary incontinence may be a sign of the underlying cause.", "key": "Medical Emergency Knowledge"},
  {"id": 57, "scen": "", "ask": "A 24-year-old man presents with sudden-onset palpitations. His heart rate is 180/min, blood pressure 120/80 mmHg, and he is fully alert. ECG shows a regular narrow-complex tachycardia. He is hemodynamically stable. What is the MOST appropriate next step in management?", "opts": ["Begin with a Valsalva manoeuvre as the first-line non-pharmacological intervention, and if this fails to terminate the tachycardia, proceed to administer rapid IV adenosine as the next step", "Administer IV adenosine immediately as the first step without attempting any vagal manoeuvres, assuming the rhythm will respond directly to pharmacological therapy", "Start IV amiodarone infusion as the primary treatment for this narrow-complex tachycardia, even though the patient is stable and other first-line options exist", "Perform immediate synchronized cardioversion despite the patient being hemodynamically stable and without trying any less invasive measures first"], "ans": "A", "ansText": "A. Begin with a Valsalva manoeuvre as the first-line non-pharmacological intervention, then proceed to IV adenosine if unsuccessful", "exp": "For stable narrow-complex tachycardia (SVT), the approach is stepwise: (1) Vagal maneuvers first (Valsalva, carotid massage) — these are non-invasive and can terminate re-entrant tachycardias. (2) If vagal maneuvers fail, give rapid IV adenosine (6mg, then 12mg). (3) If adenosine fails, consider rate control or synchronized cardioversion.", "key": "Medical Emergency Knowledge"},
  {"id": 58, "scen": "", "ask": "A 68-year-old man presents with wide-complex tachycardia at HR 200/min. The rhythm suddenly changes to atrial fibrillation, and he becomes hypotensive and confused. What is the immediate management?", "opts": ["Synchronized cardioversion", "Start IV amiodarone infusion", "Give IV adenosine", "Begin rate control with IV beta-blocker"], "ans": "A", "ansText": "A. Synchronized cardioversion", "exp": "Unstable tachycardia (with hypotension and altered consciousness) requires immediate synchronized cardioversion regardless of the rhythm type. The patient is hemodynamically compromised — there is no time for pharmacological management. Amiodarone, adenosine, and beta-blockers are for stable patients only.", "key": "Medical Emergency Knowledge"},
  {"id": 59, "scen": "", "ask": "A 21-year-old man presents with sudden-onset palpitations. ECG shows a narrow-complex tachycardia at 180/min. A previous ECG from last year showed a delta wave. He is hemodynamically stable. What is the MOST appropriate initial management?", "opts": ["Start with Valsalva manoeuvre, then give adenosine if unsuccessful", "Give IV adenosine immediately without attempting vagal manoeuvres", "Start IV amiodarone because of the history of WPW", "Perform synchronized cardioversion despite the patient being stable"], "ans": "A", "ansText": "A. Start with Valsalva manoeuvre, then give adenosine if unsuccessful", "exp": "Even with a history of WPW (delta wave on prior ECG), if the current rhythm is a narrow-complex tachycardia and the patient is stable, the standard SVT algorithm applies: Valsalva maneuver first, then adenosine. Adenosine is safe in narrow-complex SVT even with WPW history. Adenosine would only be contraindicated in wide-complex tachycardia with known WPW.", "key": "Medical Emergency Knowledge"},
  {"id": 60, "scen": "", "ask": "A 40-year-old woman with RUQ pain has a positive Murphy sign. What is the diagnosis?", "opts": ["Acute cholecystitis", "Biliary colic", "Pancreatitis", "Hepatitis"], "ans": "A", "ansText": "A. Acute cholecystitis", "exp": "Murphy's sign is positive when the patient catches their breath/has increased pain during deep palpation of the RUQ while inhaling deeply. This occurs when the inflamed gallbladder descends during inspiration and contacts the examiner's hand. It is highly specific for acute cholecystitis, distinguishing it from biliary colic (which has no peritoneal irritation).", "key": "Medical Emergency Knowledge"},
  {"id": 61, "scen": "", "ask": "A 28-year-old man presents with right lower quadrant abdominal pain and low-grade fever. Pain increases when he extends his right hip while lying on his left side. This physical finding is known as a positive psoas sign. What is the most likely diagnosis?", "opts": ["Acute appendicitis", "Acute cholecystitis", "Renal colic", "Diverticulitis"], "ans": "A", "ansText": "A. Acute appendicitis", "exp": "The psoas sign (pain on extension of the right hip) is positive when the inflamed appendix lies in a retrocecal position, resting against the psoas muscle. Extension stretches the psoas, causing pain from the adjacent inflamed appendix. Combined with RLQ pain and low-grade fever, this is classic for acute appendicitis.", "key": "Medical Emergency Knowledge"},
  {"id": 62, "scen": "", "ask": "A 30-year-old man arrives with a stab wound to the abdomen. He is agitated and trying to remove the dressing. You are the first responder at the scene. What is the MOST appropriate immediate action?", "opts": ["Ensure your own safety first and call for help before approaching the patient", "Immediately insert your fingers into the wound to check for internal bleeding", "Attempt to remove the object to prevent further internal damage", "Give the patient oral fluids to prevent dehydration"], "ans": "A", "ansText": "A. Ensure your own safety first and call for help before approaching the patient", "exp": "Scene safety is ALWAYS the first priority — especially with a stabbing (the assailant may still be present, the patient may be agitated/combative, or there may be weapons). The standard approach is: Scene safety → BSI/PPE → Assess the patient. Never approach an unsafe scene, even if the patient appears to need immediate care.", "key": "Medical Emergency Knowledge"},
  {"id": 63, "scen": "", "ask": "A 55-year-old man undergoes a routine ECG. The tracing shows a normal QRS complex and normal rhythm, but the PR interval is prolonged. What PR interval duration defines first-degree AV block?", "opts": ["More than 0.20 seconds", "More than 0.12 seconds", "Less than 0.10 seconds", "Exactly 0.16 seconds"], "ans": "A", "ansText": "A. More than 0.20 seconds", "exp": "First-degree AV block is defined by a PR interval >0.20 seconds (>200 ms, or >5 small boxes on ECG). The PR interval represents conduction time from the SA node through the AV node to ventricular depolarization. A PR interval of 0.12-0.20 seconds is normal. First-degree block is usually benign and rarely requires treatment.", "key": "Medical Emergency Knowledge"},
  {"id": 64, "scen": "", "ask": "A 70-year-old man presents with exertional dyspnea and chest discomfort. On auscultation, you hear an S3 gallop best at the right 2nd intercostal space near the sternal border. Which condition is most strongly suggested by this finding?", "opts": ["Aortic stenosis", "Mitral regurgitation", "Tricuspid regurgitation", "Pulmonary hypertension"], "ans": "A", "ansText": "A. Aortic stenosis", "exp": "The right 2nd intercostal space near the sternum is the aortic auscultation area. A murmur best heard here suggests aortic valve pathology. Combined with exertional dyspnea and chest discomfort in an elderly patient, aortic stenosis is the most likely diagnosis. AS produces a crescendo-decrescendo systolic murmur that radiates to the carotids.", "key": "Medical Emergency Knowledge"},
  {"id": 65, "scen": "", "ask": "Which of the following BEST defines a sprain?", "opts": ["Injury to a ligament due to overstretching or tearing", "Injury to a muscle or tendon from overstretching", "Bruising of soft tissue without structural damage", "Fracture of bone without displacement"], "ans": "A", "ansText": "A. Injury to a ligament due to overstretching or tearing", "exp": "A sprain is specifically an injury to a ligament (tissue connecting bone to bone) caused by overstretching or tearing. Sprains are graded: Grade I (stretch without tear), Grade II (partial tear), Grade III (complete tear). A strain, by contrast, involves injury to a muscle or tendon (tissue connecting muscle to bone).", "key": "Medical Emergency Knowledge"},
  {"id": 66, "scen": "", "ask": "A 40-year-old woman presents with recurrent episodes of chest pain occurring at rest, often waking her from sleep. ECG during the pain shows transient ST-segment elevation that resolves completely afterward. She has no history of exertional symptoms. What is the most likely diagnosis?", "opts": ["Prinzmetal", "Stable angina", "Unstable angina", "NSTEMI"], "ans": "A", "ansText": "A. Prinzmetal (Variant angina)", "exp": "Prinzmetal (variant) angina is caused by coronary artery vasospasm, not fixed atherosclerotic obstruction. It characteristically occurs at rest (often during sleep), shows transient ST elevation during pain that resolves completely, and is not triggered by exertion. Stable angina is exertional; unstable angina shows ST depression; NSTEMI has troponin elevation.", "key": "Medical Emergency Knowledge"},
  {"id": 67, "scen": "", "ask": "A 56-year-old patient has achieved return of spontaneous circulation (ROSC) after cardiac arrest. He is intubated, spontaneously breathing, and being prepared for inter-hospital transport. You are tasked with setting up ventilatory support. Which of the following ventilator settings is MOST appropriate during transport?", "opts": ["Tidal volume 10–12 mL/kg, FiO₂ 100%, PEEP 0 cmH₂O", "Tidal volume 4–6 mL/kg, FiO₂ 100%, PEEP 10–15 cmH₂O", "Tidal volume 6–8 mL/kg, FiO₂ SpO₂ 94–98%, PEEP 5 cmH₂O", "Tidal volume 12–15 mL/kg, FiO₂ 50%, PEEP 0 cmH₂O"], "ans": "C", "ansText": "C. Tidal volume 6–8 mL/kg, FiO₂ SpO₂ 94–98%, PEEP 5 cmH₂O", "exp": "Post-ROSC ventilator settings follow lung-protective strategies: Tidal volume 6-8 mL/kg ideal body weight (prevents volutrauma), FiO₂ titrated to SpO₂ 94-98% (avoid hyperoxia which causes oxidative injury), PEEP 5 cmH₂O (maintains alveolar recruitment). Hyperoxia post-cardiac arrest is associated with worse neurological outcomes.", "key": "Medical Emergency Knowledge"},
  {"id": 68, "scen": "", "ask": "Which of the following BEST defines pharmacokinetics?", "opts": ["What the body does to the drug", "What the drug does to the body", "The study of drug–receptor interactions", "The clinical effects produced by a medication"], "ans": "A", "ansText": "A. What the body does to the drug", "exp": "Pharmacokinetics = what the BODY does to the DRUG (Absorption, Distribution, Metabolism, Excretion — ADME). Pharmacodynamics = what the DRUG does to the BODY (receptor binding, mechanism of action, clinical effects). Remember: 'Kinetics = body moves the drug; Dynamics = drug acts on the body.'", "key": "Medical Emergency Knowledge"},
  {"id": 69, "scen": "", "ask": "An elderly patient presents with nausea, vomiting, abdominal distension, and has not passed stool for several days. The paramedic suspects bowel obstruction. Which antiemetic is the MOST appropriate to administer?", "opts": ["Ondansetron", "Metoclopramide", "Domperidone", "Prochlorperazine"], "ans": "A", "ansText": "A. Ondansetron", "exp": "In suspected bowel obstruction, prokinetic antiemetics like metoclopramide and domperidone are CONTRAINDICATED because they increase gut motility, risking perforation or worsening of the obstruction. Ondansetron (a 5-HT3 antagonist) works centrally on the chemoreceptor trigger zone without stimulating gut motility, making it the safest choice.", "key": "Medical Emergency Knowledge"},
  {"id": 70, "scen": "", "ask": "A 68-year-old man is brought to the emergency department with severe abdominal pain and vomiting. On examination, you notice bluish discoloration and bruising around the umbilicus. His blood pressure is low, and he appears pale and sweaty. Which clinical sign does this finding represent?", "opts": ["Cullen sign", "Grey Turner sign", "Murphy sign", "Rovsing sign"], "ans": "A", "ansText": "A. Cullen sign", "exp": "Cullen sign = periumbilical ecchymosis (bruising around the umbilicus), indicating retroperitoneal hemorrhage — classically associated with acute hemorrhagic pancreatitis. Grey Turner sign = flank ecchymosis. Both indicate severe intra-abdominal bleeding. Murphy sign relates to cholecystitis; Rovsing sign to appendicitis.", "key": "Medical Emergency Knowledge"},
  {"id": 71, "scen": "", "ask": "A patient has been stabbed in the neck at the level of C6. He is still standing, holding pressure on the wound, and bleeding is controlled. As a paramedic, what is the MOST appropriate way to manage him?", "opts": ["Let the patient walk to the ambulance", "Manual C-spine stabilisation and transfer to a spine board from standing", "Apply a C-collar and transfer to a scoop stretcher", "Let the patient lie down on the spine board by himself"], "ans": "B", "ansText": "B. Manual C-spine stabilisation and transfer to a spine board from standing", "exp": "A patient with a neck stab wound at C6 who is standing requires careful manual in-line stabilization of the cervical spine before any movement. The patient should be transferred directly from standing position to a spine board with manual c-spine control maintained throughout. Never ask the patient to walk (risk of spinal movement) or lie down independently.", "key": "Medical Emergency Knowledge"},
  {"id": 72, "scen": "", "ask": "A 24-year-old sexually active woman presents with sudden onset lower abdominal pain and light vaginal spotting. She reports missing her last period and has not been consistent with her contraceptive pills. What is the MOST likely diagnosis?", "opts": ["Appendicitis", "Pancreatitis", "Ectopic pregnancy", "Gastritis"], "ans": "C", "ansText": "C. Ectopic pregnancy", "exp": "The triad of: (1) missed period (amenorrhea), (2) lower abdominal pain, and (3) vaginal spotting in a sexually active woman of reproductive age = ectopic pregnancy until proven otherwise. This is a life-threatening emergency as rupture can cause massive internal hemorrhage. Inconsistent contraceptive use increases pregnancy risk.", "key": "Medical Emergency Knowledge"},
  {"id": 73, "scen": "", "ask": "A 72-year-old man presents with dizziness and near-syncope. His ECG shows regular P waves and regular QRS complexes, but they occur independently with no consistent relationship between them. What is the MOST likely diagnosis?", "opts": ["First-degree AV block", "Second-degree AV block", "Third-degree AV block", "Premature ventricular contraction (PVC)"], "ans": "C", "ansText": "C. Third-degree AV block", "exp": "Third-degree (complete) heart block shows AV dissociation — P waves march out regularly at one rate, QRS complexes march out regularly at a different (slower) rate, with NO relationship between them. This indicates complete failure of conduction from atria to ventricles. The ventricles are driven by an escape rhythm (junctional or ventricular).", "key": "Medical Emergency Knowledge"},
  {"id": 74, "scen": "", "ask": "You are a paramedic working with another paramedic partner and a student. The student keeps repeating the same mistake and is starting to lose confidence. What is the MOST appropriate way to manage this situation?", "opts": ["Let him learn by making mistakes", "Ask him to observe you but do not var him work without supervision", "Ask your paramedic partner to teach him and give constructive feedback", "Ignore the issue and continue the shift normally"], "ans": "C", "ansText": "C. Ask your paramedic partner to teach him and give constructive feedback", "exp": "When a student makes repeated errors and is losing confidence, having your partner (a fresh face with different teaching style) provide constructive feedback is most effective. It avoids the negative dynamic that has developed, provides a new perspective, and demonstrates the feedback sandwich approach. Simply letting them fail or restricting them doesn't promote learning.", "key": "Medical Emergency Knowledge"},
  {"id": 75, "scen": "", "ask": "A 16-year-old girl is brought to the Emergency Department 2 hours after intentionally ingesting 30 tablets of paracetamol 500 mg. She is alert but complains of nausea and has vomited once. What is the specific antidote for paracetamol poisoning?", "opts": ["Naloxone", "Flumazenil", "NAC", "Atropine"], "ans": "C", "ansText": "C. NAC (N-Acetylcysteine)", "exp": "N-Acetylcysteine (NAC) is the specific antidote for paracetamol (acetaminophen) overdose. It works by replenishing glutathione stores in the liver, which detoxifies the toxic metabolite NAPQI. NAC is most effective within 8 hours of ingestion but can be given up to 72 hours. Naloxone is for opioids; flumazenil for benzodiazepines; atropine for organophosphates.", "key": "Medical Emergency Knowledge"},
  {"id": 76, "scen": "", "ask": "A 67-year-old man is brought in by ambulance after suddenly developing slurred speech and right-sided weakness. On examination, you notice marked drooping of his right upper eyelid (ptosis). His pupils are equal and reactive, and he is alert but confused. Which nerve is MOST likely affected?", "opts": ["Phrenic nerve", "Splenic nerve", "Cranial Nerve III – Oculomotor", "Cranial Nerve VII – Facial nerve"], "ans": "C", "ansText": "C. Cranial Nerve III – Oculomotor", "exp": "Cranial nerve III (oculomotor) innervates the levator palpebrae superioris muscle, which elevates the upper eyelid. Damage to CN III causes ptosis (drooping eyelid). CN III also controls most extraocular movements, pupillary constriction, and accommodation. The facial nerve (CN VII) controls facial expression but not eyelid elevation.", "key": "Medical Emergency Knowledge"},
  {"id": 77, "scen": "", "ask": "You arrive at a gym where a 55-year-old male suddenly collapsed during exercise. He is unresponsive, not breathing normally, and has no palpable pulse. The monitor shows a wide-complex, rapid ventricular tachycardia. What is the MOST appropriate immediate management?", "opts": ["Synchronized cardioversion", "Defibrillation", "Administer oxygen only", "Check blood pressure first"], "ans": "B", "ansText": "B. Defibrillation", "exp": "Pulseless ventricular tachycardia (pVT) is a shockable rhythm treated with defibrillation (unsynchronized shock). Synchronized cardioversion is used for unstable patients WITH a pulse. When there is no pulse, the priority is immediate defibrillation at maximum energy followed by CPR. Do not delay defibrillation for pulse/BP checks.", "key": "Medical Emergency Knowledge"},
  {"id": 78, "scen": "", "ask": "A 48-year-old male is brought in after a fall from height. He is unconscious. The paramedic report states the patient is showing Cushing's triad on arrival. Which combination of vital signs BEST matches this finding?", "opts": ["Hypertension, bradycardia, and irregular respirations", "Hypotension, tachycardia, and rapid respirations", "Bradycardia, hypotension, and warm dry skin", "Tachycardia, hypertension, and normal respirations"], "ans": "A", "ansText": "A. Hypertension, bradycardia, and irregular respirations", "exp": "Cushing's triad: (1) Hypertension (reflex response to maintain cerebral perfusion against rising ICP), (2) Bradycardia (vagal response to hypertension), (3) Irregular/abnormal respirations (brainstem compression affecting respiratory centers). This triad is a LATE sign indicating imminent brain herniation — requires immediate intervention.", "key": "Medical Emergency Knowledge"},
  {"id": 79, "scen": "", "ask": "You are transferring a 58-year-old male with chest pain to the ED. En route, he suddenly becomes unconscious. He is breathing at a rate of 6 breaths per minute. What should the paramedic do FIRST?", "opts": ["Position the airway and ventilate", "Tap on the shoulder and check for response", "Consider this agonal gasping and start CPR", "Check the carotid pulse"], "ans": "D", "ansText": "D. Check the carotid pulse", "exp": "When a patient becomes unconscious during transport and has a very low respiratory rate (6/min), the first step is to check the carotid pulse to determine if this is a cardiac arrest. A rate of 6/min could be agonal breathing — which is not effective breathing and is treated as cardiac arrest. Pulse check determines the next course of action (CPR vs. supportive care).", "key": "Medical Emergency Knowledge"},
  {"id": 80, "scen": "", "ask": "A 29-year-old woman has delivered vaginally and is now experiencing heavy postpartum bleeding. You estimate blood loss to be more than 700 mL. She is pale, tachycardic, and becoming increasingly anxious. What is the MOST appropriate immediate management?", "opts": ["Fundal massage + high-flow oxygen + establish large-bore IV access + give IV fluids + consider tranexamic acid (TXA) + rapid transport", "Place the patient in Trendelenburg position + continue observation without active intervention + monitor vitals closely", "Provide oral fluids + offer reassurance + delay intervention while reassessing bleeding in 10 minutes", "Apply cold compresses to the abdomen only + avoid uterine massage + wait to see if bleeding slows spontaneously"], "ans": "A", "ansText": "A. Fundal massage + high-flow oxygen + establish large-bore IV access + give IV fluids + consider tranexamic acid (TXA) + rapid transport", "exp": "PPH management follows a systematic approach: Fundal massage (stimulates uterine contraction), high-flow oxygen (compensate for blood loss), large-bore IV access with fluid resuscitation, consider TXA (tranexamic acid — reduces bleeding by inhibiting fibrinolysis), and rapid transport to definitive care. Uterotonic drugs (oxytocin) may be given if available.", "key": "Medical Emergency Knowledge"},
