<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>DOH-Paramedic: CBT</title>
<style>
:root{
  --primary:#2c3e50;--accent:#e74c3c;--green:#27ae60;
  --yellow:#f39c12;--light:#ecf0f1;--card:#fff;
  --border:#bdc3c7;--text:#2c3e50;--sub:#7f8c8d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text);}
header{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:22px 20px 16px;text-align:center;border-bottom:4px solid var(--accent);}
header h1{font-size:1.4rem; margin-bottom:5px;}
main{max-width:820px;margin:0 auto;padding:10px 10px 80px;}
.score-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:18px;display:flex;justify-content:space-around;border:1px solid var(--border);box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.sc-item{text-align:center;}
.sc-item .val{font-size:1.4rem;font-weight:bold;display:block;}
.sc-item .lbl{font-size:0.65rem;color:var(--sub);text-transform:uppercase;}
.q-card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.05);}
.q-head{background:#fdfefe;padding:15px;border-bottom:1px solid #eee;display:flex;gap:12px;}
.q-num{background:var(--primary);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:bold;}
.q-num.ok{background:var(--green);}
.q-num.bad{background:var(--accent);}
.q-scen{font-size:0.95rem; line-height:1.6;}
.q-ask{font-size:0.95rem; font-weight:bold; padding:15px 15px 5px; color:var(--primary);}
.opts{padding:10px 15px 15px;display:flex;flex-direction:column;gap:8px;}
.opt{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;gap:10px;align-items:center;transition:0.2s;}
.opt.right{background:#e9f7ef;border-color:var(--green);}
.opt.wrong{background:#fdedec;border-color:var(--accent);}
.opt.done{pointer-events:none;}
#regOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#2c3e50;z-index:9999;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;}
.reg-box{background:#fff;border-radius:20px;padding:30px;max-width:420px;width:100%;text-align:center;}
.reg-field input{width:100%;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:1.2rem;text-align:center;margin-bottom:15px; outline:none;}
.btn-reg{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;}
.results{display:none;text-align:center;padding:40px;background:#fff;border-radius:20px;margin-top:20px; border:2px solid var(--primary);}
.results.show{display:block;}
.grade{font-size:3.5rem;font-weight:bold;margin:15px 0;}
.gA{color:var(--green);} .gF{color:var(--accent);}
.fab{position:fixed;bottom:25px;width:56px;height:56px;color:#fff;border:none;border-radius:50%;font-size:1.4rem;cursor:pointer;z-index:8000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
#sbFab{right:20px;background:#f39c12;}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9000;align-items:center;justify-content:center;padding:16px;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto;padding:20px;position:relative;}
.sb-row{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #eee; font-size: 0.9rem;}
.expbox{display:none;padding:15px;background:#f0f7ff;border-top:2px solid #3498db;margin:0;}
.expbox.show{display:block;}
.exp-top{font-weight:bold;color:#2c3e50;margin-bottom:8px;font-size:0.9rem;}
.exp-body{font-size:0.88rem;line-height:1.7;color:#333;}
</style>
</head>
<body>

<div id="regOverlay">
  <div class="reg-box">
    <div style="font-size:3.5rem">🚑</div>
    <h2 style="margin-bottom:10px">DOH-Paramedic: CBT</h2>
    <p style="color: #e74c3c; font-weight: bold; margin-bottom: 20px;">Enter your old Military ID</p>
    <div class="reg-field">
      <input type="tel" id="regMilitaryID" placeholder="ID Number" autocomplete="off" />
    </div>
    <button id="loginBtn" class="btn-reg" onclick="submitReg()">🚀 Enter Exam</button>
    <p id="syncMsg" style="margin-top:15px; font-size:0.85rem; color:#7f8c8d; display:none;">Checking cloud storage...</p>
    <div style="margin-top:20px; font-size:0.75rem; color:#bdc3c7;">Created By Arshad Majeed Whatsapp 0561274959</div>
  </div>
</div>

<header>
  <h1>DOH-Paramedic: CBT</h1>
  <div style="font-size:0.6rem;color:rgba(255,255,255,0.4);margin-top:2px;">v4.9-final</div>
  <div id="userBadge" style="display:none; background:rgba(255,255,255,0.15); border-radius:20px; padding:5px 14px; font-size:0.76rem; color:#ecf0f1; margin-top:10px;"></div>
</header>

<main>
  <div class="score-card">
    <div class="sc-item"><span class="val" id="eAns">0</span><span class="lbl">Answered</span></div>
    <div class="sc-item c"><span class="val" id="eCorr">0</span><span class="lbl">Correct</span></div>
    <div class="sc-item p"><span class="val" id="ePct">0%</span><span class="lbl">Total Score</span></div>
  </div>
  <div id="examQs"></div>
  <div id="resultsPanel" class="results">
    <h2>Result Summary</h2>
    <div class="grade" id="rGrade">—</div>
    <p style="font-size:2.5rem; margin:10px 0; font-weight:bold" id="finalPct">0%</p>
    <button class="btn-reg" style="max-width:200px" onclick="location.reload()">Close</button>
  </div>
</main>

<button id="sbFab" class="fab" onclick="toggleModal('sbModal')">🏆</button>


<div id="sbModal" class="modal" onclick="if(event.target==this)this.classList.remove('open')">
  <div class="modal-box">
    <h3>🏆 Leaderboard</h3>
    <div id="sbList" style="margin-top:15px">Loading...</div>
  </div>
</div>



<script>
